<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Financial Litmus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="env/config.js"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const API_KEY = (typeof ENV !== 'undefined' && ENV.ALPHA_VANTAGE_KEY) || '';

    const FSES_QUESTIONS = [
      "I feel confident in my ability to manage market risk.",
      "I understand how different asset classes perform during economic downturns.",
      "I can make investment decisions without relying entirely on professional advice."
    ];

    // Fetch last ~10 trading days for a ticker, return structured week data
    async function fetchWeeklyData(ticker) {
      const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&outputsize=compact&apikey=${API_KEY}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (json.Note || json.Information) throw new Error('API rate limit reached (25 req/day). Try again later.');
      const series = json['Time Series (Daily)'];
      if (!series) throw new Error(`No data found for "${ticker}" — check the ticker and try again.`);

      // Dates sorted newest → oldest
      const dates = Object.keys(series).sort((a, b) => b.localeCompare(a));
      if (dates.length < 2) throw new Error(`Insufficient data for "${ticker}"`);

      // Use up to last 7 trading days
      const window   = dates.slice(0, 7).reverse(); // oldest → newest for chart
      const prices   = window.map(d => parseFloat(series[d]['4. close']));
      const current  = prices[prices.length - 1];
      const weekAgo  = prices[0];
      const changePct = ((current - weekAgo) / weekAgo) * 100;

      return {
        ticker:      ticker.toUpperCase(),
        current,
        weekAgo,
        changePct,
        prices,
        dates:       window,
        currentDate: dates[0],
        weekAgoDate: window[0],
      };
    }

    // ── Contextual Tooltip ────────────────────────────────────────────────────
    function Tooltip({ tip, children }) {
      const [show, setShow] = useState(false);
      return (
        <span className="relative inline-block cursor-help"
          onMouseEnter={() => setShow(true)}
          onMouseLeave={() => setShow(false)}
        >
          {children}
          {show && (
            <span className="absolute z-50 bottom-full left-1/2 -translate-x-1/2 mb-2 w-60 bg-gray-900 text-white text-xs rounded-lg px-3 py-2 shadow-xl leading-relaxed pointer-events-none whitespace-normal" style={{minWidth:'180px'}}>
              {tip}
              <span className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900" style={{width:0,height:0}} />
            </span>
          )}
        </span>
      );
    }

    const SENTIMENT_TIPS = {
      'Bullish':          'Analysts and news sources have a positive outlook on this stock — they expect the price to rise.',
      'Somewhat-Bullish': 'Mild positive sentiment — more good news than bad, but not strongly so.',
      'Somewhat_Bullish': 'Mild positive sentiment — more good news than bad, but not strongly so.',
      'Neutral':          'No strong directional sentiment — news and analyst views are evenly balanced.',
      'Somewhat-Bearish': 'Mild negative sentiment — more concern than confidence in this stock\'s near-term performance.',
      'Somewhat_Bearish': 'Mild negative sentiment — more concern than confidence in this stock\'s near-term performance.',
      'Bearish':          'Analysts and news sources have a negative outlook on this stock — they expect the price to fall.',
    };

    // ── Mini Sparkline Chart ───────────────────────────────────────────────────
    function Sparkline({ prices, positive }) {
      const canvasRef = useRef(null);
      const chartRef  = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !prices.length) return;
        if (chartRef.current) chartRef.current.destroy();
        const color = positive ? 'rgba(34,197,94,1)' : 'rgba(239,68,68,1)';
        const fill  = positive ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)';
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels: prices.map((_, i) => i),
            datasets: [{ data: prices, borderColor: color, backgroundColor: fill,
              borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0 }],
          },
          options: {
            responsive: false,
            animation: false,
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            scales:  { x: { display: false }, y: { display: false } },
          },
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [prices.join(',')]);

      return <canvas ref={canvasRef} width="140" height="56" />;
    }

    // ── FSES Assessment Modal ──────────────────────────────────────────────────
    function AssessmentModal({ onClose }) {
      const [step,           setStep]           = useState(0); // 0=screener, 1-3=questions
      const [isFinanceMajor, setIsFinanceMajor] = useState(false);
      const [hasBrokerage,   setHasBrokerage]   = useState(false);
      const [answers,        setAnswers]         = useState({ q1: 0, q2: 0, q3: 0 });

      const keys          = ['q1', 'q2', 'q3'];
      const currentKey    = step > 0 ? keys[step - 1] : null;
      const currentAnswer = currentKey ? answers[currentKey] : 0;
      const canAdvance    = step === 0 || currentAnswer > 0;

      const handleNext = () => {
        if (step < 3) {
          setStep(step + 1);
        } else {
          const avg = (answers.q1 + answers.q2 + answers.q3) / 3;
          onClose(avg, { isFinanceMajor, hasBrokerage });
        }
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full">
            <h2 className="text-2xl font-bold mb-1 text-blue-600">Welcome to Financial Litmus</h2>

            {/* ── Step 0: Screener ── */}
            {step === 0 && (
              <>
                <p className="text-gray-500 text-sm mb-6">
                  Before we begin, answer two quick background questions. Your responses
                  help contextualize your results — there are no right or wrong answers.
                </p>
                <div className="space-y-4 mb-8">
                  <label className="flex items-start gap-3 cursor-pointer group">
                    <input
                      type="checkbox"
                      checked={isFinanceMajor}
                      onChange={e => setIsFinanceMajor(e.target.checked)}
                      className="mt-0.5 w-4 h-4 accent-blue-500 flex-shrink-0"
                    />
                    <span className="text-sm text-gray-700 group-hover:text-gray-900 leading-snug">
                      I am currently studying or hold a degree in <strong>finance, accounting, or economics</strong>.
                    </span>
                  </label>
                  <label className="flex items-start gap-3 cursor-pointer group">
                    <input
                      type="checkbox"
                      checked={hasBrokerage}
                      onChange={e => setHasBrokerage(e.target.checked)}
                      className="mt-0.5 w-4 h-4 accent-blue-500 flex-shrink-0"
                    />
                    <span className="text-sm text-gray-700 group-hover:text-gray-900 leading-snug">
                      I currently have an <strong>active brokerage account</strong> (e.g., Robinhood, Fidelity, Schwab, TD Ameritrade).
                    </span>
                  </label>
                </div>
                <button
                  onClick={handleNext}
                  className="w-full py-2 rounded font-semibold bg-blue-500 text-white hover:bg-blue-600 transition-all"
                >
                  Continue →
                </button>
              </>
            )}

            {/* ── Steps 1–3: FSES Questions ── */}
            {step > 0 && (
              <>
                {/* Progress bar */}
                <div className="mb-6 mt-2">
                  <div className="flex justify-between text-xs text-gray-400 mb-1.5">
                    <span className="font-medium">Question {step} of {FSES_QUESTIONS.length}</span>
                    <span>{Math.round((step / FSES_QUESTIONS.length) * 100)}% complete</span>
                  </div>
                  <div className="w-full bg-gray-100 rounded-full h-1.5">
                    <div
                      className="bg-blue-500 h-1.5 rounded-full transition-all duration-300"
                      style={{ width: `${(step / FSES_QUESTIONS.length) * 100}%` }}
                    />
                  </div>
                </div>

                <p className="text-sm text-gray-500 mb-1 italic">
                  Rate your agreement with the following statement:
                </p>
                <p className="text-base font-semibold text-gray-800 mb-5 leading-snug">
                  "{FSES_QUESTIONS[step - 1]}"
                </p>

                <div className="flex gap-2 justify-between mb-2">
                  {[1, 2, 3, 4, 5].map(v => (
                    <button key={v}
                      onClick={() => setAnswers(prev => ({ ...prev, [currentKey]: v }))}
                      className={`flex-1 h-11 rounded-full text-sm font-semibold border-2 transition-all ${
                        currentAnswer === v
                          ? 'bg-blue-500 text-white border-blue-500 scale-105'
                          : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'
                      }`}
                    >{v}</button>
                  ))}
                </div>
                <div className="flex justify-between text-xs text-gray-400 mb-8">
                  <span>Strongly Disagree</span><span>Strongly Agree</span>
                </div>

                <div className="flex gap-2">
                  <button
                    onClick={() => setStep(step - 1)}
                    className="px-4 py-2 rounded border border-gray-200 text-gray-500 text-sm hover:bg-gray-50 transition-all"
                  >
                    ← Back
                  </button>
                  <button
                    onClick={handleNext}
                    disabled={!canAdvance}
                    className={`flex-1 py-2 rounded font-semibold transition-all ${
                      canAdvance
                        ? 'bg-blue-500 text-white hover:bg-blue-600'
                        : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                    }`}
                  >
                    {step === FSES_QUESTIONS.length ? 'Continue →' : 'Next →'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    const SUGGESTED_STOCKS = [
      { ticker: 'AAPL',  name: 'Apple'       },
      { ticker: 'TSLA',  name: 'Tesla'       },
      { ticker: 'KO',    name: 'Coca-Cola'   },
      { ticker: 'MCD',   name: "McDonald's"  },
      { ticker: 'AMZN',  name: 'Amazon'      },
      { ticker: 'MSFT',  name: 'Microsoft'   },
      { ticker: 'GOOGL', name: 'Alphabet'    },
      { ticker: 'META',  name: 'Meta'        },
      { ticker: 'NVDA',  name: 'NVIDIA'      },
      { ticker: 'JPM',   name: 'JPMorgan'    },
      { ticker: 'DIS',   name: 'Disney'      },
      { ticker: 'NKE',   name: 'Nike'        },
      { ticker: 'WMT',   name: 'Walmart'     },
      { ticker: 'NFLX',  name: 'Netflix'     },
      { ticker: 'SBUX',  name: 'Starbucks'   },
      { ticker: 'PFE',   name: 'Pfizer'      },
      { ticker: 'V',     name: 'Visa'        },
      { ticker: 'BA',    name: 'Boeing'      },
    ];

    // ── Sector Data ────────────────────────────────────────────────────────────
    const SECTOR_MAP = {
      AAPL: 'Technology',  MSFT: 'Technology',  GOOGL: 'Technology',
      AMZN: 'Consumer Discretionary',  NKE: 'Consumer Discretionary',
      META: 'Media & Entertainment',  NFLX: 'Media & Entertainment',  DIS: 'Media & Entertainment',
      NVDA: 'Semiconductors',
      TSLA: 'Electric Vehicles',
      JPM:  'Financial Services',  V: 'Financial Services',
      KO:   'Consumer Staples',  MCD: 'Consumer Staples',  WMT: 'Consumer Staples',  SBUX: 'Consumer Staples',
      PFE:  'Healthcare/Pharma',
      BA:   'Aerospace & Defense',
    };
    function getSector(ticker) {
      return SECTOR_MAP[ticker.toUpperCase()] || 'General Equity';
    }

    const SECTOR_CONTENT = {
      'Technology': {
        keyMetric:  'Price-to-Earnings (P/E) ratio — tech companies often trade at high multiples, meaning you are paying a premium for expected future growth, not current profits.',
        keyRisk:    'Interest rate sensitivity. When rates rise, future profits are worth less today, which hits high-growth tech stocks harder than most other sectors.',
        watchFor:   'Federal Reserve interest rate decisions, quarterly earnings reports (especially revenue growth guidance), and any antitrust or regulatory news from the DOJ or EU.',
        reflection: 'If this company stopped growing tomorrow and simply held its current revenue flat, would its stock price still make sense? What does your answer reveal about how much of the price is based on proven reality versus investor expectations?',
      },
      'Consumer Staples': {
        keyMetric:  'Dividend yield — staples companies are known for reliable, growing dividends. A falling yield (as the price rises) can signal the stock is becoming expensive relative to its income.',
        keyRisk:    'Margin compression from inflation. When input costs like ingredients, packaging, and logistics rise faster than companies can raise prices, profits shrink even when sales look stable.',
        watchFor:   'CPI (Consumer Price Index) data releases, quarterly gross margin commentary on earnings calls, and commodity price trends for key inputs like corn, sugar, coffee, or wheat.',
        reflection: 'People buy Coca-Cola and McDonald\'s even in recessions. Does that stability make you feel safer holding this stock — or does it make you wonder why the upside is more limited than faster-growing sectors?',
      },
      'Consumer Discretionary': {
        keyMetric:  'Same-store sales growth or revenue growth rate — this tells you whether the core business is genuinely expanding or whether growth is just coming from new store openings.',
        keyRisk:    'Consumer spending cycles. When unemployment rises or confidence falls, people cut discretionary purchases first. These stocks often fall faster than the broader market in downturns.',
        watchFor:   'Consumer Confidence Index (CCI) releases, monthly retail sales reports, unemployment claims, and company-specific data on inventory levels and foot traffic.',
        reflection: 'Would you personally buy more of this company\'s products if your income dropped 20%? If the honest answer is no, what does that tell you about the risk of holding this stock through an economic slowdown?',
      },
      'Financial Services': {
        keyMetric:  'Net Interest Margin (NIM) — the spread between what a bank earns on loans and what it pays on deposits. It is the core engine of banking profitability.',
        keyRisk:    'Credit cycle risk. When the economy weakens, loan defaults rise rapidly, eroding bank profits. Regulatory changes — capital requirements, stress tests — can also affect returns unexpectedly.',
        watchFor:   'Federal Reserve interest rate decisions (directly affects NIM), quarterly loan loss provisions on earnings calls, and any Federal Reserve stress test results.',
        reflection: 'Banks profit when people and businesses borrow confidently and repay reliably. If you believed a recession was 12 months away, how would that change how much you wanted to own in this sector?',
      },
      'Healthcare/Pharma': {
        keyMetric:  'Pipeline depth — the number of drug candidates in Phase 2 and Phase 3 clinical trials. A thin pipeline means heavy dependence on existing approved drugs.',
        keyRisk:    'Binary event risk. A single FDA rejection can drop a pharma stock 20–40% in a day. A major drug losing patent protection can eliminate billions in revenue overnight.',
        watchFor:   'FDA advisory committee meetings and approval decisions, patent expiration calendars for key drugs, and Medicare drug price negotiation announcements.',
        reflection: 'Pharmaceutical companies can save lives and generate enormous profits — or lose both in a single clinical trial failure. Does that binary risk profile match how you normally make decisions when the outcome is uncertain?',
      },
      'Media & Entertainment': {
        keyMetric:  'Subscriber count or Monthly Active Users (MAU) — for streaming and social media companies, audience size drives both ad revenue and subscription income.',
        keyRisk:    'Attention risk. Revenue is directly tied to how many people use the platform and how often. Competition for time is intense, and user behavior can shift faster than a company can adapt.',
        watchFor:   'Quarterly subscriber or user growth numbers, advertiser spending trends, and regulatory news around content moderation, data privacy (especially EU rules), or antitrust.',
        reflection: 'How many hours per week do you personally spend on this company\'s platform or content? Does knowing your own usage pattern change how you think about whether this business can keep growing?',
      },
      'Semiconductors': {
        keyMetric:  'Data center revenue growth and order backlog — for AI-era chip companies, these signal whether enterprise demand is structural or a short-term wave that could reverse.',
        keyRisk:    'Supply chain concentration and geopolitical risk. The most advanced chips are manufactured in Taiwan. Any disruption to that supply chain — political, natural, or military — would have immediate global impact.',
        watchFor:   'TSMC earnings and capacity announcements, U.S.–China trade policy (especially export controls on advanced chips), and major hyperscaler capital spending plans from Microsoft, Google, Amazon, and Meta.',
        reflection: 'Chip companies\' market caps have grown faster than almost any other sector during the AI wave — driven largely by enthusiasm about what AI will become. How much of the current stock price do you believe reflects what AI will definitely deliver, versus what investors hope it will?',
      },
      'Electric Vehicles': {
        keyMetric:  'Vehicle delivery numbers and production capacity utilization — these reveal whether the company is actually scaling or merely promising to scale.',
        keyRisk:    'Regulatory and policy risk. EV economics are deeply tied to federal tax credits, emissions regulations, and infrastructure spending. A change in administration can materially shift the business.',
        watchFor:   'Quarterly delivery reports, federal EV tax credit policy changes, energy credit revenue announcements (a significant but volatile income stream), and competition from legacy automakers entering EV.',
        reflection: 'EV adoption depends simultaneously on charging infrastructure, battery costs, consumer preferences, and government policy. If one of those four factors reversed course, how confident are you that the others would compensate?',
      },
      'Aerospace & Defense': {
        keyMetric:  'Backlog-to-revenue ratio — defense contracts are often multi-year. A large backlog provides revenue visibility, but technical delays can persist for years even after a contract is won.',
        keyRisk:    'Program execution risk. Cost overruns on fixed-price government contracts have historically been a major source of losses. Safety incidents can ground entire product lines indefinitely.',
        watchFor:   'U.S. defense budget appropriations, FAA or NTSB safety investigations, major contract awards or cancellations from the Department of Defense, and any cost-to-complete estimate changes on fixed-price programs.',
        reflection: 'Defense companies tend to benefit from geopolitical instability — more conflict generally means more government spending on their products. Does owning a stake in that dynamic feel straightforward to you, or does it raise questions you want to think through?',
      },
      'General Equity': {
        keyMetric:  'Revenue growth rate and profit margin trend — for any company, these two numbers together tell you whether the business is genuinely expanding or just cutting costs to show profits.',
        keyRisk:    'Familiarity bias. Investors often overweight companies they have heard of, even when they do not understand the business model. Recognizing a brand name is not the same as understanding an investment.',
        watchFor:   'Quarterly earnings reports (especially revenue guidance for the next quarter), any significant management changes, and broader market sentiment indicators like the VIX volatility index.',
        reflection: 'Can you explain in three sentences how this company makes money and why it should be worth more in five years than it is today? If that is difficult, what specific information would you need to answer it with confidence?',
      },
    };

    // ── Plan personalization helpers ────────────────────────────────────────────
    function fmtChange(pct) {
      if (Math.abs(pct) < 0.005) return 'flat';
      return (pct >= 0 ? 'up ' : 'down ') + Math.abs(pct).toFixed(2) + '%';
    }
    function gainedOrLost(pct) { return pct >= 0 ? 'gained' : 'lost'; }
    function stockListPhrase(wl) {
      const items = wl.map(s => `${s.name || s.ticker} (${s.ticker})`);
      if (items.length === 1) return items[0];
      if (items.length === 2) return items[0] + ' and ' + items[1];
      return items.slice(0, -1).join(', ') + ', and ' + items[items.length - 1];
    }
    function getDiversificationProfile(sectors) {
      const u = [...new Set(sectors)];
      if (u.length === 1) return 'concentrated';
      if (u.length === sectors.length) return 'fully diversified';
      return 'partially diversified';
    }

    // ── Personalized step generator ─────────────────────────────────────────────
    function generatePersonalizedSteps(watchlist, tier) {
      const enriched = watchlist.map(s => ({
        ...s,
        sector:  getSector(s.ticker),
        content: SECTOR_CONTENT[getSector(s.ticker)],
      }));
      const sectors       = enriched.map(e => e.sector);
      const uniqueSectors = [...new Set(sectors)];
      const divProfile    = getDiversificationProfile(sectors);
      const sorted        = [...enriched].sort((a, b) => b.changePct - a.changePct);
      const best          = sorted[0];
      const worst         = sorted[sorted.length - 1];
      const listPhrase    = stockListPhrase(watchlist);
      const isLow = tier === 'low', isHigh = tier === 'high';

      // ── Step 1: Why These Stocks ──────────────────────────────────────────────
      const step1 = {
        icon: '🪞', tag: 'Self-Awareness',
        title: 'Step 1 — Why Did You Pick These Stocks?',
        objective: `Examine the reasoning behind your choice of ${listPhrase} — and separate genuine knowledge from familiarity.`,
        actions: isLow ? [
          `Write one sentence for each stock explaining exactly why you picked it. "I've heard of it" is a valid starting answer — honesty here is the point.`,
          `For each stock, describe in plain language what the company actually does and how it makes money. If you're unsure about one, that's the signal.`,
          `Rate your actual confidence in each stock on a scale of 1–5. The gaps between your ratings matter more than the ratings themselves.`,
          `Your portfolio is ${divProfile}: ${enriched.map(e => `${e.ticker} is in the ${e.sector} sector`).join(', ')}.`,
        ] : isHigh ? [
          `Write a complete bull and bear case for each of ${listPhrase}. Both cases must be grounded in data, not sentiment.`,
          `Your portfolio is ${divProfile}: ${enriched.map(e => `${e.ticker} → ${e.sector}`).join(', ')}. Was that a deliberate risk decision?`,
          `Identify the single assumption that underlies all three positions simultaneously. If that assumption breaks, what happens to the entire portfolio?`,
        ] : [
          `Write a 2–3 sentence investment thesis for each stock — why you believe it is worth owning right now, not just why you've heard of it.`,
          `Your portfolio is ${divProfile}: ${enriched.map(e => `${e.ticker} → ${e.sector}`).join(', ')}. Was that intentional?`,
          `For your strongest conviction pick, state what would have to be true about the world in 12 months for your thesis to be wrong.`,
        ],
        reflection: isLow
          ? `Which of your three stocks would be hardest to explain to a friend — and which feels easiest? That gap is exactly where this learning path begins.`
          : isHigh
          ? `What would a sophisticated short-seller say about your portfolio as a whole — not individual stocks, but the macro thesis that must hold for all three to outperform?`
          : `If you had to drop one stock right now, which would it be and why? The ease or difficulty of that decision reveals how strong your actual conviction is.`,
        why: isLow
          ? `Metacognition — knowing what you know versus what you think you know — is the prerequisite for learning. Bandura's self-efficacy research shows that people who can accurately assess their own competence improve faster than those who over- or underestimate it.`
          : `Investment thesis documentation is used by professional fund managers because it creates an auditable record that separates process from outcome — the foundation of calibrated confidence rather than overconfidence.`,
      };

      // ── Step 2: Diversification / Risk Profile ────────────────────────────────
      const divActions = (() => {
        if (divProfile === 'concentrated') {
          const sector = uniqueSectors[0];
          return isLow ? [
            `All three of your stocks — ${listPhrase} — are in the ${sector} sector. Look up what "concentration risk" means.`,
            `Research what typically happens to ${sector} stocks during the specific risk event for that sector: ${enriched[0].content.keyRisk}`,
            `Identify one stock from a completely different sector that you could theoretically swap in. What would change about your portfolio's risk?`,
            `Write down: what is the single event that would cause all three of your stocks to fall at the same time?`,
          ] : [
            `Your entire portfolio (${listPhrase}) sits in ${sector}. Quantify the correlation — look up each stock's beta relative to the ${sector} sector index.`,
            `Sector risk: ${enriched[0].content.keyRisk} Estimate how a severe version of this risk would affect each of your three holdings differently.`,
            `Argue why high-conviction sector concentration can be a valid strategy. Then argue why it is dangerous for a new investor. Which argument is stronger for your situation?`,
          ];
        } else if (divProfile === 'fully diversified') {
          return isLow ? [
            `Your three stocks span distinct sectors: ${enriched.map(e => `${e.name} is ${e.sector}`).join(', ')}. This is called sector diversification.`,
            `Look up what diversification is designed to protect against. Write one sentence in your own words.`,
            `This past week, which direction did each of your stocks move? If they all moved the same way, research what "market correlation" means — sectors can still move together in a broad selloff.`,
            `Research what an index fund is and how it achieves diversification automatically. How does your three-stock portfolio compare?`,
          ] : [
            `Your portfolio spans ${uniqueSectors.join(', ')} — this is sector-diversified. But evaluate whether these sectors are actually uncorrelated in practice.`,
            `Research each sector's performance during the 2022 rate-hike cycle. Did sector diversity protect investors, or did all three sectors fall together regardless?`,
            `True diversification is about correlation, not just sector labels. Look up the correlation between your sectors over the last 3 years. Does the data support your diversification thesis?`,
          ];
        } else {
          return isLow ? [
            `Your portfolio covers ${uniqueSectors.length} sectors: ${enriched.map(e => `${e.ticker} (${e.sector})`).join(', ')}.`,
            `Research: what does it mean when two assets are "correlated"? Write a plain-English definition — no jargon.`,
            `Which two of your stocks do you think would react most similarly if the U.S. economy slowed sharply? What makes you think so?`,
            `If you had to add a fourth stock from a sector not yet in your portfolio, what sector would you choose and why?`,
          ] : [
            `You have ${uniqueSectors.length} sectors: ${enriched.map(e => `${e.ticker} → ${e.sector}`).join(', ')}. Evaluate whether your mix is genuinely uncorrelated or just superficially different.`,
            `Look up historical correlation between your represented sectors. Are any more correlated than you assumed?`,
            `Design the single addition that would most improve your portfolio's risk-adjusted profile — and explain why using data, not intuition.`,
          ];
        }
      })();

      const step2 = {
        icon: '⚖️', tag: 'Portfolio Analysis',
        title: `Step 2 — Understand Your Portfolio's Risk Profile`,
        objective: `Understand what ${divProfile === 'concentrated' ? 'concentration' : 'diversification'} actually means for your specific holdings — not as an abstract concept, but as a property of ${listPhrase}.`,
        actions: divActions,
        reflection: divProfile === 'concentrated'
          ? `If the single biggest risk to the ${uniqueSectors[0]} sector materialized tomorrow, what would happen to your virtual portfolio — and how would that feel emotionally? What does that reaction tell you about your actual risk tolerance?`
          : `Your stocks span multiple sectors. Does that mean you're protected from a major market downturn? Think carefully: what single scenario would cause all three to fall simultaneously — and how likely is that scenario?`,
        why: `Modern Portfolio Theory (Markowitz, 1952) established that risk-adjusted returns improve when portfolio components have low correlation — meaning they respond differently to the same market events. Understanding this at the level of your own holdings is more durable than understanding it abstractly.`,
      };

      // ── Steps 3–5: Per-stock analysis ─────────────────────────────────────────
      const perStockSteps = enriched.map((stock, idx) => {
        const { name, ticker, changePct, sector, content } = stock;
        const direction = fmtChange(changePct);
        const gl        = gainedOrLost(changePct);
        const stepNum   = idx + 3;
        const icons     = ['🔎', '📊', '🧪'];

        const actions = isLow ? [
          `${name} (${ticker}) ${gl} ${Math.abs(changePct).toFixed(2)}% over the past week. Before looking for explanations, note whether that surprises you — and why.`,
          `Research what ${name} actually does. Write a single sentence describing its core business in your own words.`,
          `The key metric for ${sector} companies is: ${content.keyMetric}`,
          `The main risk for ${sector} companies is: ${content.keyRisk}`,
          `Read one news article about ${name} from this week. Does anything connect to the ${direction} price movement?`,
        ] : isHigh ? [
          `${name} (${ticker}) moved ${direction} this week. Reconstruct the narrative: which specific news events or macro factors best explain this move? Are there any that seem to contradict it?`,
          `Key metric for ${sector}: ${content.keyMetric} Evaluate where ${ticker} currently stands on this metric and whether its valuation is justified given that reading.`,
          `Main risk: ${content.keyRisk} Model the downside: if this risk fully materialized, what is the fair value of ${ticker} — and how far is that from today's price?`,
          `What to monitor: ${content.watchFor} Which of these catalysts is most likely within the next 90 days, and what is your thesis if it occurs?`,
        ] : [
          `${name} (${ticker}) moved ${direction} this week. Before checking headlines, write your hypothesis: what do you think caused this movement?`,
          `Key metric for ${sector}: ${content.keyMetric} Look up ${ticker}'s current figure on Yahoo Finance or Google Finance.`,
          `Main risk: ${content.keyRisk} Rate how much you believe this risk is currently priced into ${ticker}'s stock price (1 = not at all, 5 = fully priced in). Justify your rating.`,
          `What to watch: ${content.watchFor} Name one specific event you'd monitor if you were following this stock closely.`,
        ];

        return {
          icon: icons[idx] || '📌', tag: sector,
          title: `Step ${stepNum} — Analyze ${name} (${ticker}) — ${sector}`,
          objective: isLow
            ? `Build genuine understanding of ${name} as a business — not just as a ticker symbol that moved ${direction} this week.`
            : `Develop a calibrated, evidence-based view of ${name} that accounts for both the ${sector} sector's dynamics and the specific 1-week price move.`,
          actions,
          reflection: content.reflection,
          why: isLow
            ? `Deep understanding of one investment builds confidence that holds during price drops — because you understand the business, not just the chart. Broad but shallow familiarity with many stocks rarely produces the same outcome.`
            : `Sector-level analysis reveals structural forces acting on a company that are invisible in the price chart. Understanding the ${sector} sector's specific risk drivers transforms ${ticker} from a number on a screen into a business with predictable sensitivities to real-world events.`,
        };
      });

      // ── Final step: Synthesis ─────────────────────────────────────────────────
      const spyCache     = (() => { try { return JSON.parse(localStorage.getItem(SPY_CACHE_KEY) || 'null'); } catch { return null; } })();
      const spyChangePct = spyCache ? spyCache.changePct : null;
      const eqReturn     = enriched.reduce((sum, e) => sum + e.changePct, 0) / enriched.length;
      const spyLine      = spyChangePct !== null
        ? (isLow
            ? `The S&P 500 returned ${fmtChange(spyChangePct)} this same week. Your equal-weight portfolio averaged ${fmtChange(eqReturn)}. Did you beat the market or trail it — and does that match what you expected?`
            : isHigh
            ? `Calculate your alpha: your equal-weight portfolio returned ${fmtChange(eqReturn)} vs the S&P 500's ${fmtChange(spyChangePct)}. Is the difference explained by selection skill or was it driven by a single holding? What does that tell you about the repeatability of the result?`
            : `Your equal-weight portfolio returned ${fmtChange(eqReturn)} vs the S&P 500's ${fmtChange(spyChangePct)}. What specifically drove the gap — sector exposure, a single outlier stock, or broader market correlation?`)
        : null;

      const finalStepNum = enriched.length + 3;
      const finalStep = {
        icon: '🎯', tag: 'Goal Setting',
        title: `Step ${finalStepNum} — Synthesize and Set Your Next Goal`,
        objective: isLow
          ? `Consolidate what you've learned about ${listPhrase} into a concrete, forward-looking plan — not a vague intention.`
          : isHigh
          ? `Challenge your conclusions: what does the evidence from this pathway confirm about your original thesis — and what does it contradict?`
          : `Use the performance data and analysis to refine your investment thesis and set a measurable next goal.`,
        actions: isLow ? [
          `Your best performer this week was ${best.name} (${best.ticker}) at ${fmtChange(best.changePct)}. Your weakest was ${worst.name} (${worst.ticker}) at ${fmtChange(worst.changePct)}. Write down whether this was predictable or a surprise — and why.`,
          ...(spyLine ? [spyLine] : []),
          `Go to the My Scores tab and review your FSES baseline. Do you feel more confident now than when you started?`,
          `Write one financial concept you now understand clearly that you didn't when you started this pathway.`,
          `Set one specific, measurable habit going forward — for example: "I will check ${enriched[0].ticker}'s price and read one article in the Daily News tab regularly."`,
        ] : isHigh ? [
          `Review all three 1-week returns: ${enriched.map(e => `${e.ticker} ${fmtChange(e.changePct)}`).join(', ')}. Where was your analysis predictive? Where did it fail, and why?`,
          ...(spyLine ? [spyLine] : []),
          `Retake the FSES assessment via the My Scores tab. High-efficacy users who completed counter-narrative work sometimes see a slight score decrease — that is calibration, not regression. It means your confidence is becoming more accurate.`,
          `Identify one cognitive bias that appeared in your analysis of this portfolio. Describe specifically where it showed up and what more rigorous thinking would have looked like.`,
          `Write a one-paragraph post-mortem: if you were constructing or analyzing this portfolio from scratch, what would you do differently?`,
        ] : [
          `Compare 1-week performance across your portfolio: ${enriched.map(e => `${e.ticker} ${fmtChange(e.changePct)}`).join(', ')}. Does this confirm or challenge your original thesis for each stock?`,
          ...(spyLine ? [spyLine] : []),
          `Retake the FSES assessment in the My Scores tab. Your target is High (≥ 4.0). If unchanged, revisit the per-stock analysis steps — depth of analysis there is the most powerful efficacy-builder.`,
          `Set one measurable, sector-specific goal: something you will actively monitor about the industries you now hold.`,
        ],
        reflection: isLow
          ? `Where did you feel most confident over this pathway — and where did you still feel most out of your depth? Those two answers are your exact roadmap for what comes next.`
          : isHigh
          ? `If a professional fund manager reviewed your analysis of ${listPhrase} and the decisions you made, what would they praise — and what would they push back on hardest?`
          : `Your portfolio's performance this week was shaped partly by your decisions and partly by forces outside your control. Can you clearly separate which parts of the outcome belong to which category?`,
        why: isLow
          ? `Goal-setting research (Locke & Latham, 2002) shows that specific, written goals outperform vague intentions by a significant margin. The act of committing a goal to writing is itself a behavioral signal of growing self-belief.`
          : `Systematic post-analysis — reviewing decisions against outcomes with explicit attention to process rather than result — is how professionals convert experience into expertise. Without it, experience simply reinforces existing biases rather than correcting them.`,
      };

      return [step1, step2, ...perStockSteps, finalStep];
    }

    // ── Stock Picker Modal ─────────────────────────────────────────────────────
    function StockPickerModal({ onClose }) {
      const [query,         setQuery]         = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [searching,     setSearching]     = useState(false);
      const [preview,       setPreview]       = useState(null);
      const [picks,         setPicks]         = useState([]);
      const [loading,       setLoading]       = useState(false);
      const [error,         setError]         = useState('');
      const [showDropdown,  setShowDropdown]  = useState(false);
      const searchTimerRef     = useRef(null);
      const skipNextSearchRef  = useRef(false);
      const [showReflection,   setShowReflection] = useState(false);
      const [reasoning,        setReasoning]       = useState('');

      const MAX = 3;
      const canAdd = preview && picks.length < MAX && !picks.find(p => p.ticker === preview.ticker);

      // Debounced symbol search — fires 400ms after user stops typing
      useEffect(() => {
        setPreview(null); setError(''); setShowDropdown(false);
        if (query.trim().length < 2) { setSearchResults([]); return; }

        if (skipNextSearchRef.current) {
          skipNextSearchRef.current = false;
          return;
        }

        searchTimerRef.current = setTimeout(async () => {
          setSearching(true);
          try {
            const res  = await fetch(`https://www.alphavantage.co/query?function=SYMBOL_SEARCH&keywords=${encodeURIComponent(query)}&apikey=${API_KEY}`);
            const json = await res.json();
            if (json.Note || json.Information) {
              setError('API rate limit reached (25 req/day). You can still type a ticker directly and press Enter.');
              setSearchResults([]);
              setSearching(false);
              return;
            }
            const matches = (json.bestMatches || [])
              .filter(m => ['Equity', 'ETF'].includes(m['3. type']) && m['4. region'] === 'United States')
              .slice(0, 6);
            setSearchResults(matches);
            setShowDropdown(matches.length > 0);
            if (matches.length === 0) setError('No results found. Try a different name or type the ticker and press Enter.');
          } catch {
            setSearchResults([]);
            setError('Search failed. Check your connection or type the ticker directly and press Enter.');
          } finally {
            setSearching(false);
          }
        }, 400);

        return () => clearTimeout(searchTimerRef.current);
      }, [query]);

      const handleDirectLookup = async () => {
        const ticker = query.trim().toUpperCase();
        if (!ticker) return;
        clearTimeout(searchTimerRef.current);
        setSearching(false);
        setShowDropdown(false);
        setSearchResults([]);
        setLoading(true); setError('');
        try {
          const data = await fetchWeeklyData(ticker);
          setPreview({ ...data, name: '' });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSelectResult = async (match) => {
        const ticker = match['1. symbol'];
        const name   = match['2. name'];
        setQuery(name);
        setShowDropdown(false);
        setSearchResults([]);
        setLoading(true); setError('');
        try {
          const data = await fetchWeeklyData(ticker);
          setPreview({ ...data, name });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSelectSuggestion = async (suggestion) => {
        clearTimeout(searchTimerRef.current);
        skipNextSearchRef.current = true;
        setSearching(false);
        setShowDropdown(false);
        setSearchResults([]);
        setQuery(suggestion.name);
        setPreview(null); setError('');
        setLoading(true);
        try {
          const data = await fetchWeeklyData(suggestion.ticker);
          setPreview({ ...data, name: suggestion.name });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleAdd = () => {
        if (!canAdd) return;
        setPicks(prev => [...prev, preview]);
        setPreview(null);
        setQuery('');
      };

      const handleRemove = (ticker) => setPicks(prev => prev.filter(p => p.ticker !== ticker));

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full relative overflow-hidden">
            <h2 className="text-2xl font-bold mb-1 text-blue-600">Build Your Watchlist</h2>
            <p className="text-gray-500 text-sm mb-4">
              Pick from popular stocks below, or search by company name / ticker.
              Add exactly 3 to get started.
            </p>

            {/* Popular stock suggestions */}
            <div className="mb-5">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Popular Stocks</p>
              <div className="flex flex-wrap gap-1.5">
                {SUGGESTED_STOCKS.map(s => {
                  const alreadyPicked = picks.some(p => p.ticker === s.ticker);
                  const isPreviewing  = preview && preview.ticker === s.ticker;
                  return (
                    <button
                      key={s.ticker}
                      onClick={() => !alreadyPicked && handleSelectSuggestion(s)}
                      disabled={alreadyPicked}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-all ${
                        alreadyPicked
                          ? 'bg-green-50 border-green-300 text-green-600 cursor-default'
                          : isPreviewing
                          ? 'bg-blue-100 border-blue-400 text-blue-700'
                          : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 cursor-pointer'
                      }`}
                    >
                      {alreadyPicked ? '✓ ' : ''}{s.name}
                      <span className={`ml-1 text-xs ${alreadyPicked ? 'text-green-400' : 'text-gray-400'}`}>{s.ticker}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Search input */}
            <div className="relative mb-2">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={query}
                  onChange={e => { setQuery(e.target.value); setPreview(null); setError(''); }}
                  onFocus={() => searchResults.length > 0 && setShowDropdown(true)}
                  onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
                  onKeyDown={e => { if (e.key === 'Enter') handleDirectLookup(); }}
                  placeholder="Search by company name or ticker… (Enter to look up directly)"
                  className="border rounded px-3 py-2 text-sm flex-1"
                />
                {searching && (
                  <div className="flex items-center px-3 text-gray-400 text-xs">Searching…</div>
                )}
                {loading && (
                  <div className="flex items-center px-3 text-gray-400 text-xs">Loading…</div>
                )}
              </div>

              {/* Dropdown results */}
              {showDropdown && searchResults.length > 0 && (
                <div className="absolute z-10 w-full bg-white border border-gray-200 rounded shadow-lg mt-1 max-h-56 overflow-y-auto">
                  {searchResults.map((m, i) => (
                    <button
                      key={i}
                      onMouseDown={() => handleSelectResult(m)}
                      className="w-full text-left px-4 py-2.5 hover:bg-blue-50 border-b last:border-b-0 flex items-center justify-between gap-3"
                    >
                      <div>
                        <span className="font-bold text-sm text-gray-800">{m['2. name']}</span>
                        <span className="text-xs text-gray-400 ml-2">{m['4. region']}</span>
                      </div>
                      <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded flex-shrink-0">{m['1. symbol']}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {error && <p className="text-red-500 text-xs mb-3">{error}</p>}

            {/* Preview card */}
            {preview && (
              <div className="border rounded p-3 mb-4 bg-gray-50 flex items-center justify-between gap-3">
                <div>
                  <p className="font-bold text-gray-800">{preview.ticker}</p>
                  {preview.name && <p className="text-xs text-gray-500 mb-0.5">{preview.name}</p>}
                  <p className="text-xs text-gray-500">
                    ${preview.current.toFixed(2)} &nbsp;·&nbsp;
                    <span className={preview.changePct >= 0 ? 'text-green-600' : 'text-red-500'}>
                      {preview.changePct >= 0 ? '+' : ''}{preview.changePct.toFixed(2)}% (7d)
                    </span>
                  </p>
                </div>
                <div className="flex items-center gap-3">
                  <Sparkline prices={preview.prices} positive={preview.changePct >= 0} />
                  <button
                    onClick={handleAdd}
                    disabled={!canAdd}
                    className={`px-3 py-1.5 rounded text-sm font-semibold whitespace-nowrap ${
                      canAdd ? 'bg-blue-500 text-white hover:bg-blue-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                    }`}
                  >
                    {picks.find(p => p.ticker === preview.ticker) ? 'Already Added' : 'Add'}
                  </button>
                </div>
              </div>
            )}

            {/* Selected picks */}
            <div className="space-y-2 mb-6">
              {[0, 1, 2].map(i => {
                const pick = picks[i];
                return (
                  <div key={i} className={`border rounded p-3 flex items-center gap-3 ${pick ? 'bg-white' : 'bg-gray-50'}`}>
                    <span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-bold flex items-center justify-center flex-shrink-0">
                      {i + 1}
                    </span>
                    {pick ? (
                      <>
                        <div className="flex-1">
                          <p className="font-bold text-sm text-gray-800">{pick.ticker}</p>
                          {pick.name && <p className="text-xs text-gray-400">{pick.name}</p>}
                          <p className="text-xs text-gray-500">
                            ${pick.current.toFixed(2)} &nbsp;·&nbsp;
                            <span className={pick.changePct >= 0 ? 'text-green-600' : 'text-red-500'}>
                              {pick.changePct >= 0 ? '+' : ''}{pick.changePct.toFixed(2)}% (7d)
                            </span>
                          </p>
                        </div>
                        <button onClick={() => handleRemove(pick.ticker)} className="text-gray-300 hover:text-red-500 text-xl leading-none">×</button>
                      </>
                    ) : (
                      <p className="text-xs text-gray-400 italic">Empty slot — search above to add</p>
                    )}
                  </div>
                );
              })}
            </div>

            <button
              onClick={() => picks.length === MAX && setShowReflection(true)}
              disabled={picks.length < MAX}
              className={`w-full py-2 rounded font-semibold transition-all ${
                picks.length === MAX
                  ? 'bg-blue-500 text-white hover:bg-blue-600'
                  : 'bg-gray-200 text-gray-400 cursor-not-allowed'
              }`}
            >
              {picks.length < MAX ? `Select ${MAX - picks.length} more stock${MAX - picks.length !== 1 ? 's' : ''}` : "Let's Begin →"}
            </button>

            {/* ── Reflection overlay ── */}
            {showReflection && (
              <div className="absolute inset-0 bg-white rounded-lg p-8 flex flex-col">
                <h2 className="text-xl font-bold mb-1 text-blue-600">Before You Begin</h2>
                <p className="text-gray-500 text-sm mb-5">
                  Stating your reasoning before seeing results strengthens what you learn from the experience.
                  This is optional — skip it if you prefer.
                </p>

                {/* Mini pick summary */}
                <div className="flex gap-2 mb-5">
                  {picks.map(p => (
                    <div key={p.ticker} className="flex-1 border border-blue-100 rounded-lg p-3 text-center bg-blue-50">
                      <p className="text-sm font-bold text-blue-700">{p.ticker}</p>
                      {p.name && <p className="text-xs text-gray-400 mt-0.5 truncate">{p.name}</p>}
                    </div>
                  ))}
                </div>

                <label className="text-sm font-semibold text-gray-700 mb-1.5">
                  Why did you choose these 3 stocks?
                  <span className="font-normal text-gray-400 ml-1">(optional)</span>
                </label>
                <textarea
                  value={reasoning}
                  onChange={e => setReasoning(e.target.value)}
                  placeholder="e.g., I chose Apple because I use their products every day. Tesla because I believe in clean energy. McDonald's because I know it as a stable business..."
                  className="border rounded-lg p-3 text-sm text-gray-700 resize-none focus:outline-none focus:ring-2 focus:ring-blue-300"
                  rows={4}
                />
                <p className="text-xs text-gray-400 mt-1.5 mb-6 leading-relaxed">
                  Reflecting before seeing results is a core component of Bandura's mastery experience framework — it builds the habit of deliberate, reasoned decision-making.
                </p>

                <div className="flex gap-2 mt-auto">
                  <button
                    onClick={() => onClose(picks, '')}
                    className="px-4 py-2 border border-gray-200 rounded text-gray-500 text-sm hover:bg-gray-50 transition-all"
                  >
                    Skip
                  </button>
                  <button
                    onClick={() => onClose(picks, reasoning)}
                    className="flex-1 py-2 rounded font-semibold bg-blue-500 text-white hover:bg-blue-600 transition-all"
                  >
                    Let's Begin →
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Stock Card ─────────────────────────────────────────────────────────────
    function StockCard({ stock }) {
      const positive = stock.changePct >= 0;
      const dollarChange = stock.current - stock.weekAgo;

      const fmt = (d) => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      return (
        <div className="bg-white shadow rounded p-5 flex flex-col gap-3">
          <div className="flex items-start justify-between">
            <div>
              <Tooltip tip="A ticker symbol is a short abbreviation (1–5 letters) that uniquely identifies a publicly traded company on a stock exchange. For example, AAPL represents Apple Inc.">
                <span className="inline-block bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded mb-1">{stock.ticker}</span>
              </Tooltip>
              {stock.name && <p className="text-xs text-gray-400 mb-1">{stock.name}</p>}
              <p className="text-2xl font-bold text-gray-800">${stock.current.toFixed(2)}</p>
              <Tooltip tip="The change in this stock's closing price over the last 7 trading days. A positive number means the stock gained value; negative means it lost value.">
                <p className={`text-sm font-semibold ${positive ? 'text-green-600' : 'text-red-500'}`}>
                  {positive ? '+' : ''}{dollarChange.toFixed(2)} ({positive ? '+' : ''}{stock.changePct.toFixed(2)}%)
                </p>
              </Tooltip>
            </div>
            <Sparkline prices={stock.prices} positive={positive} />
          </div>
          <div className="text-xs text-gray-400 border-t pt-2 flex justify-between">
            <Tooltip tip="The closing price 7 trading days ago — used as the starting point for the performance calculation above.">
              <span>7 days ago: <strong className="text-gray-600">${stock.weekAgo.toFixed(2)}</strong></span>
            </Tooltip>
            <span>{fmt(stock.weekAgoDate)} → {fmt(stock.currentDate)}</span>
          </div>
        </div>
      );
    }

    // ── Adaptive Learning Plan Data ──────────────────────────────────────────────
    const LEARNING_PLANS = {
      low: {
        tier:        'Low Self-Efficacy',
        color:       'text-red-600',
        borderColor: 'border-red-400',
        tagBg:       'bg-red-100 text-red-700',
        intro:       'A score below 3.0 means financial decisions currently feel overwhelming — and you likely avoid or defer them. That is not a character flaw; it is a learned response. This pathway is grounded in Bandura\'s Self-Efficacy Theory and designed to rebuild your confidence from the ground up through structured, low-stakes experiences. No real money. No permanent decisions. Just guided practice.',
        steps: [
          {
            icon:      '🪞',
            title:     'Step 1 — Name Your Financial Anxiety',
            tag:       'Self-Awareness',
            objective: 'Identify the specific financial situations that trigger avoidance so you can address them directly rather than as one undifferentiated dread.',
            actions: [
              'Write down 3 financial decisions you have put off in the last 6 months — e.g., checking your bank balance, setting up a savings account, reading an investment statement.',
              'For each one, rate how anxious it makes you feel on a scale of 1–5.',
              'Identify the most common theme across your list: Is it fear of making a mistake? Feeling excluded by financial language? Fear of confronting what you owe or own?',
              'Pick the lowest-anxiety item on your list. That is the entry point for this plan.',
            ],
            reflection: 'What is one financial topic you have been pretending to understand in conversations? What would it feel like to openly admit you do not know — and look it up?',
            why:        'Bandura\'s self-efficacy theory identifies physiological arousal (anxiety) as a primary barrier to confident behavior. Naming and ranking anxiety shifts it from a global, paralyzing dread into a specific, addressable problem — the first clinical step toward behavior change.',
          },
          {
            icon:      '📚',
            title:     'Step 2 — Build Your Financial Vocabulary',
            tag:       'Cognitive Foundation',
            objective: 'Remove vocabulary as a psychological barrier to financial engagement. You cannot feel confident in a language you do not speak.',
            actions: [
              'Learn these five terms: Stock (a share of ownership in a company), Dividend (a cash payment companies make to shareholders), Market Cap (the total dollar value of a company\'s shares), Portfolio (your personal collection of investments), Index Fund (a fund that tracks a broad market index like the S&P 500).',
              'For each term, write one sentence using it in your own words — not the dictionary definition.',
              'Open your Daily News tab and read one article. Identify any word or phrase you do not understand and look it up before moving on.',
