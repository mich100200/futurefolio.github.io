    // ── Reusable Chart component ───────────────────────────────────────────────
    function HorizontalBarChart({ id, labels, data, colors, xLabel }) {
      const canvasRef = useRef(null);
      const chartRef  = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels,
            datasets: [{ data, backgroundColor: colors, borderWidth: 0 }],
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                title: { display: !!xLabel, text: xLabel },
                ticks: { callback: v => v + '%' },
              },
            },
          },
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [id]);

      return <canvas ref={canvasRef} />;
    }

      const [allocation, setAllocation] = useState({});
      const [phase, setPhase]           = useState('pick'); // pick | allocate | confidence | results
      const [confidence, setConfidence] = useState(5);

      const handleSelectScenario = (s) => {
        setScenario(s);
        setAllocation(Object.fromEntries(s.assets.map(a => [a.key, 0])));
        setPhase('allocate');

      const handleReset = () => { setScenario(null); setAllocation({}); setPhase('pick'); setConfidence(5); };

      const total     = Object.values(allocation).reduce((s, v) => s + v, 0);
      const isValid   = total === 1000;
      const remaining = 1000 - total;

      const calcResults = (conf) => {
        let weightedReturn = 0;
        scenario.assets.forEach(a => { weightedReturn += (allocation[a.key] / 1000) * a.outcome; });
        let competenceScore = weightedReturn > 0 ? 9 : weightedReturn > -3 ? 5 : weightedReturn > -7 ? 3 : 1;
        return { returnPct: weightedReturn, competenceScore, clgScore: Math.abs(conf - competenceScore) };
      };

      if (phase === 'pick') return <ScenarioPicker onSelect={handleSelectScenario} completedIds={completedIds} />;

      const results = phase === 'results' ? calcResults(confidence) : null;

        if (res.clgScore <= 2) return { label: 'Well Calibrated',  color: 'text-green-600',  bg: 'bg-green-50 border-green-200',  msg: 'Your confidence closely matched the actual outcome. Strong financial self-awareness.' };
        if (confidence > res.competenceScore) return { label: 'Overconfident', color: 'text-red-500', bg: 'bg-red-50 border-red-200', msg: 'You were more confident than the outcome warranted. Overconfidence can lead to under-hedged portfolios.' };
        return { label: 'Underconfident', color: 'text-yellow-600', bg: 'bg-yellow-50 border-yellow-200', msg: 'You underestimated your strategy. Building calibrated confidence through practice helps decision-making.' };
      };

      const assetLabels = scenario.assets.map(a => a.label);
      const actualData  = scenario.assets.map(a => a.outcome);

        <div className="space-y-4">
          {phase === 'confidence' && (

              setConfidence(conf);
              setPhase('results');

          {/* Allocation form */}
          {phase === 'allocate' && (

                            <tr key={a.key} className="hover:bg-gray-50">
                              <td className="px-3 py-2 font-medium">{a.label}</td>
                              <td className="text-right px-3 py-2 text-gray-600">${allocation[a.key]}</td>
                              <td className={`text-right px-3 py-2 font-semibold ${a.outcome > 0 ? 'text-green-600' : a.outcome < 0 ? 'text-red-500' : 'text-gray-500'}`}>
                                {a.outcome > 0 ? '+' : ''}{a.outcome}%
                              </td>
                              <td className={`text-right px-3 py-2 font-semibold ${pnl > 0 ? 'text-green-600' : pnl < 0 ? 'text-red-500' : 'text-gray-500'}`}>
                                {pnl > 0 ? '+' : ''}${pnl.toFixed(2)}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                      <tfoot className="bg-gray-50 font-bold border-t-2 border-gray-300">
                        <tr>
                          <td className="px-3 py-2">Total</td>
                          <td className="text-right px-3 py-2">$1,000</td>
                          <td className={`text-right px-3 py-2 ${results.returnPct >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                            {results.returnPct >= 0 ? '+' : ''}{results.returnPct.toFixed(2)}%
                          </td>
                          <td className={`text-right px-3 py-2 ${dollarReturn >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                            {dollarReturn >= 0 ? '+' : ''}${dollarReturn.toFixed(2)}
                          </td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>

                  {/* Actual returns chart */}
                  <h4 className="text-sm font-semibold text-gray-700 mb-2">All Asset Returns This Scenario</h4>
                  <HorizontalBarChart
                    id={`actual-${scenario.id}`}
                    labels={assetLabels}
                    data={actualData}
                    colors={actualColors}
                    xLabel="Actual Return %"
                  />
                </div>

                {/* CLG + Feedback */}
                <div className="bg-white shadow rounded p-6">
                  <div className="grid grid-cols-3 gap-3 mb-4">
                    <div className="bg-blue-50 border border-blue-200 rounded p-3 text-center">
                      <p className="text-xs text-blue-500 mb-1">CLG Score</p>
                      <p className="text-3xl font-bold text-blue-600">{results.clgScore}</p>
                      <p className="text-xs text-gray-400 mt-1">Lower = better</p>
                    </div>
                    <div className="bg-gray-50 border rounded p-3 text-center">
                      <p className="text-xs text-gray-500 mb-1">Your Confidence</p>
                      <p className="text-3xl font-bold text-gray-700">{confidence}<span className="text-base font-normal">/10</span></p>
                    </div>
                    <div className="bg-gray-50 border rounded p-3 text-center">
                      <p className="text-xs text-gray-500 mb-1">Competence Score</p>
                      <p className="text-3xl font-bold text-gray-700">{results.competenceScore}<span className="text-base font-normal">/10</span></p>
                    </div>
                  </div>

                  <div className={`border rounded p-4 mb-4 ${feedback.bg}`}>
                    <p className={`font-bold text-lg mb-1 ${feedback.color}`}>{feedback.label}</p>
                    <p className="text-gray-700 text-sm">{feedback.msg}</p>
                  </div>

                  {/* Scenario explanation reveal */}
                  <div className="bg-gray-50 border rounded p-4">
                    <p className="text-xs font-bold text-gray-500 uppercase mb-2">What Was This Scenario? — {scenario.period}</p>
                    <p className="text-sm text-gray-700">{scenario.explanation}</p>
                  </div>

                  {baselineFSES !== null && (
                    <p className="text-xs text-gray-400 mt-3">Baseline FSES: {baselineFSES.toFixed(1)}/5</p>
                  )}
                </div>

                <button onClick={handleReset} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm">
                  ← Try a Different Scenario
                </button>
              </div>
            );
          })()}
        </div>
      );
    }

    // ── Live Market Tab ────────────────────────────────────────────────────────
    function LiveMarketTab() {
      const defaultAssets = [
        { key: 'spy',  label: 'SPY — S&P 500 ETF', desc: 'Broad U.S. equity market', price: null },
        { key: 'bnd',  label: 'BND — Bond ETF',     desc: 'U.S. aggregate bonds',    price: null },
        { key: 'cash', label: 'Cash',               desc: 'No risk, no return',      price: 1    },
      ];

      const [assets, setAssets]               = useState(defaultAssets);
      const [allocation, setAllocation]       = useState({});
      const [livePhase, setLivePhase]         = useState('allocate');
      const [pendingScenario, setPendingScenario] = useState(null);
      const [loading, setLoading]             = useState(false);
      const [searchTicker, setSearchTicker]   = useState('');
      const [searchLoading, setSearchLoading] = useState(false);
      const [searchError, setSearchError]     = useState('');

      useEffect(() => {
        const stored = localStorage.getItem('pendingLiveScenario');
        if (stored) {
          const s = JSON.parse(stored);
          const diffDays = (new Date() - new Date(s.dateSubmitted)) / (1000 * 60 * 60 * 24);
          setPendingScenario({ ...s, ready: diffDays >= 7 });
          setLivePhase(diffDays >= 7 ? 'resolve' : 'pending');
        }
      }, []);

      const fetchPrice = async (ticker) => {
        const res  = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${LIVE_API_KEY}`);
        const json = await res.json();
        const price = parseFloat(json["Global Quote"]?.["05. price"] || 0);
        if (!price) throw new Error(`No data for ${ticker}`);
        return price;
      };

      const loadDefaultPrices = async () => {
        setLoading(true);
        try {
          const [spy, bnd] = await Promise.all([fetchPrice('SPY'), fetchPrice('BND')]);
          setAssets(prev => prev.map(a => a.key === 'spy' ? { ...a, price: spy } : a.key === 'bnd' ? { ...a, price: bnd } : a));
        } catch (e) { console.error(e); }
        finally { setLoading(false); }
      };

      const handleSearch = async () => {
        const ticker = searchTicker.trim().toUpperCase();
        if (!ticker) return;
        if (assets.find(a => a.key === ticker.toLowerCase())) { setSearchError(`${ticker} is already in your list.`); return; }
        setSearchLoading(true); setSearchError('');
        try {
          const price = await fetchPrice(ticker);
          setAssets(prev => [...prev, { key: ticker.toLowerCase(), label: ticker, desc: `Live price: $${price.toFixed(2)}`, price }]);
          setSearchTicker('');
        } catch { setSearchError(`No data found for "${ticker}". Check the symbol and try again.`); }
        finally { setSearchLoading(false); }
      };

      const removeAsset = (key) => {
        setAssets(prev => prev.filter(a => a.key !== key));
        setAllocation(prev => { const n = { ...prev }; delete n[key]; return n; });
      };

      const liveTotal = Object.values(allocation).reduce((s, v) => s + v, 0);
      const liveValid = liveTotal === 1000;
      const liveRemaining = 1000 - liveTotal;

      const handleLiveConfidenceSubmit = (conf) => {
        const startingPrices  = Object.fromEntries(assets.filter(a => a.price && a.key !== 'cash').map(a => [a.key, a.price]));
        const assetLabels     = Object.fromEntries(assets.map(a => [a.key, a.label]));
        const toSave = { dateSubmitted: new Date().toISOString(), allocation, confidenceScore: conf, startingPrices, assetLabels };
        localStorage.setItem('pendingLiveScenario', JSON.stringify(toSave));
        setPendingScenario({ ...toSave, ready: false });
        setLivePhase('pending');
      };

      return (
        <div className="space-y-4">
          {livePhase === 'confidence' && <ConfidenceModal onSubmit={handleLiveConfidenceSubmit} />}

          <div className="bg-white shadow rounded p-6">
            <div className="flex items-center gap-2 mb-2">
              <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">LIVE MARKET</span>
            </div>
            <h2 className="text-xl font-bold mb-1">Current Market Scenario</h2>
            <p className="text-gray-600 text-sm mb-5">Allocate $1,000 across real assets. Add any stock by ticker. Your allocation and confidence will be tracked and scored after 7 days.</p>

            {livePhase === 'allocate' && (
              <>
                {/* Stock search */}
                <div className="mb-5 p-4 bg-gray-50 border rounded">
                  <p className="text-sm font-semibold text-gray-700 mb-2">Add a Stock by Ticker</p>
                  <div className="flex gap-2">
                    <input
                      type="text" value={searchTicker} maxLength={10} placeholder="e.g. AAPL, TSLA, NVDA"
                      onChange={e => { setSearchTicker(e.target.value.toUpperCase()); setSearchError(''); }}
                      onKeyDown={e => e.key === 'Enter' && handleSearch()}
                      className="border rounded px-3 py-2 text-sm flex-1"
                    />
                    <button onClick={handleSearch} disabled={searchLoading || !searchTicker.trim()} className="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600 disabled:opacity-50 whitespace-nowrap">
                      {searchLoading ? 'Looking up...' : 'Look Up'}
                    </button>
                  </div>
                  {searchError && <p className="text-red-500 text-xs mt-2">{searchError}</p>}
                </div>

                {!assets.filter(a => a.key !== 'cash').every(a => a.price) && (
                  <div className="mb-4">
                    <button onClick={loadDefaultPrices} disabled={loading} className="bg-gray-700 text-white px-4 py-2 rounded text-sm hover:bg-gray-800 disabled:opacity-50">
                      {loading ? 'Fetching...' : 'Load SPY & BND Prices'}
                    </button>
                  </div>
                )}

                <h3 className="font-semibold mb-3 text-sm text-gray-800">Allocate your $1,000:</h3>
                <div className="space-y-2 mb-4">
                  {assets.map(asset => (
                    <div key={asset.key} className="border rounded p-3 flex items-center gap-3">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-medium text-sm text-gray-800">{asset.label}</span>
                          {asset.price && asset.key !== 'cash' && <span className="text-xs text-gray-400">${asset.price.toFixed(2)}/share</span>}
                        </div>
                        <p className="text-xs text-gray-500">{asset.desc}</p>
                      </div>
                      <div className="flex items-center gap-1 w-28 flex-shrink-0">
                        <span className="text-gray-400 text-sm">$</span>
                        <input type="number" min="0" max="1000" value={allocation[asset.key] || ''} placeholder="0"
                          onChange={e => setAllocation(prev => ({ ...prev, [asset.key]: Math.max(0, parseInt(e.target.value) || 0) }))}
                          className="border rounded px-2 py-1 w-full text-sm" />
                      </div>
                      {!['spy', 'bnd', 'cash'].includes(asset.key) && (
                        <button onClick={() => removeAsset(asset.key)} className="text-gray-300 hover:text-red-500 text-xl leading-none flex-shrink-0">×</button>
                      )}
                    </div>
                  ))}
                </div>

                <div className="mb-4">
                  <div className="flex justify-between text-xs text-gray-500 mb-1">
                    <span>Allocated: <strong>${liveTotal}</strong></span>
                    <span className={liveRemaining < 0 ? 'text-red-500 font-bold' : liveRemaining === 0 ? 'text-green-600 font-bold' : ''}>
                      {liveRemaining > 0 ? `$${liveRemaining} remaining` : liveRemaining === 0 ? '✓ Fully allocated' : `$${Math.abs(liveRemaining)} over budget`}
                    </span>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                    <div className={`h-full rounded-full transition-all ${liveTotal > 1000 ? 'bg-red-500' : liveTotal === 1000 ? 'bg-green-500' : 'bg-blue-400'}`}
                      style={{ width: `${Math.min((liveTotal / 1000) * 100, 100)}%` }} />
                  </div>
                </div>

                <button onClick={() => { if (liveValid) setLivePhase('confidence'); }} disabled={!liveValid}
                  className={`px-6 py-2 rounded font-semibold transition-all ${liveValid ? 'bg-green-500 text-white hover:bg-green-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                  Submit Allocation
                </button>
              </>
            )}

            {livePhase === 'pending' && pendingScenario && (
              <div className="bg-yellow-50 border border-yellow-200 rounded p-4">
                <p className="font-semibold text-yellow-700 mb-2">Live Scenario Active</p>
                <p className="text-sm text-gray-700 mb-3">Submitted on <strong>{new Date(pendingScenario.dateSubmitted).toLocaleDateString()}</strong>. Return after 7 days to see results and receive your CLG score.</p>
                <div className="text-xs text-gray-500 space-y-1">
                  {Object.entries(pendingScenario.allocation).filter(([,v]) => v > 0).map(([k, v]) => (
                    <p key={k}>{pendingScenario.assetLabels?.[k] || k}: ${v}</p>
                  ))}
                  <p className="mt-1">Confidence declared: {pendingScenario.confidenceScore}/10</p>
                </div>
              </div>
            )}

            {livePhase === 'resolve' && pendingScenario && (
              <LiveResolve
                pendingScenario={pendingScenario}
                fetchPrice={fetchPrice}
                onClear={() => { localStorage.removeItem('pendingLiveScenario'); setLivePhase('allocate'); setPendingScenario(null); setAssets(defaultAssets); setAllocation({}); }}
              />
            )}
          </div>
        </div>
      );
    }

    function LiveResolve({ pendingScenario, fetchPrice, onClear }) {
      const [currentPrices, setCurrentPrices] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleResolve = async () => {
        setLoading(true);
        try {
          const tickers = Object.keys(pendingScenario.startingPrices);
          const prices  = await Promise.all(tickers.map(t => fetchPrice(t)));
          setCurrentPrices(Object.fromEntries(tickers.map((t, i) => [t, prices[i]])));
        } catch (e) { console.error(e); }
        finally { setLoading(false); }
      };

      let res = null;
      if (currentPrices) {
        let weightedReturn = 0;
        Object.entries(pendingScenario.allocation).forEach(([key, amt]) => {
          if (key === 'cash') return;
          const start = pendingScenario.startingPrices[key], end = currentPrices[key];
          if (start && end) weightedReturn += ((end - start) / start) * 100 * (amt / 1000);
        });
        const competenceScore = weightedReturn > 0 ? 9 : weightedReturn > -3 ? 5 : weightedReturn > -7 ? 3 : 1;
        res = { returnPct: weightedReturn, clgScore: Math.abs(pendingScenario.confidenceScore - competenceScore) };
      }

      return (
        <div className="space-y-3">
          <p className="text-sm text-gray-700">Your live scenario from <strong>{new Date(pendingScenario.dateSubmitted).toLocaleDateString()}</strong> is ready to resolve.</p>
          <button onClick={handleResolve} disabled={loading} className="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600 disabled:opacity-50">
            {loading ? 'Fetching prices...' : 'Resolve Live Scenario'}
          </button>
          {res && (
            <div className="bg-gray-50 border rounded p-4 text-sm space-y-2">
              {Object.keys(pendingScenario.startingPrices).map(k => (
                <p key={k}><strong>{pendingScenario.assetLabels?.[k] || k}:</strong> ${pendingScenario.startingPrices[k]?.toFixed(2)} → ${currentPrices[k]?.toFixed(2)}</p>
              ))}
              <div className="border-t pt-2 mt-2">
                <p className={`font-bold ${res.returnPct >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                  Portfolio Return: {res.returnPct >= 0 ? '+' : ''}{res.returnPct.toFixed(2)}%
                </p>
                <p className="font-bold text-blue-600 text-xl">Final CLG Score: {res.clgScore}</p>
              </div>
              <button onClick={onClear} className="text-xs text-gray-400 underline">Clear &amp; Start New</button>
            </div>
          )}
        </div>
      );
    }

    // ── Scores & Methodology Tab ──────────────────────────────────────────────
    function ScoresTab({ baselineFSES, completedScenarios, overallCLG, allDone }) {
      const clgInterpret = (score) => {
        if (score <= 2)  return { label: 'Well Calibrated',  color: 'text-green-600',  bg: 'bg-green-50 border-green-200' };
        if (score <= 5)  return { label: 'Moderate Gap',     color: 'text-yellow-600', bg: 'bg-yellow-50 border-yellow-200' };
        return               { label: 'Large Gap',          color: 'text-red-500',    bg: 'bg-red-50 border-red-200' };
      };

      const fsesInterpret = (score) => {
        if (score >= 4)  return { label: 'High Self-Efficacy',    color: 'text-green-600' };
        if (score >= 3)  return { label: 'Moderate Self-Efficacy', color: 'text-yellow-600' };
        return               { label: 'Low Self-Efficacy',       color: 'text-red-500' };
      };

      return (
        <div className="space-y-5">

          {/* Your Scores */}
          <div className="bg-white shadow rounded p-6">
            <h2 className="text-xl font-bold mb-1">Your Scores</h2>
            <p className="text-gray-500 text-sm mb-5">These are updated as you complete each scenario. Finish all five for your final Overall CLG.</p>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
              {/* FSES */}
              <div className="border rounded p-4">
                <p className="text-xs text-gray-500 uppercase font-semibold mb-1">FSES Baseline</p>
                {baselineFSES !== null ? (
                  <>
                    <p className="text-4xl font-bold text-gray-800 mb-1">{baselineFSES.toFixed(1)}<span className="text-lg font-normal text-gray-400"> / 5</span></p>
                    <p className={`text-sm font-semibold ${fsesInterpret(baselineFSES).color}`}>{fsesInterpret(baselineFSES).label}</p>
                  </>
                ) : (
                  <p className="text-gray-400 text-sm italic">Not yet recorded</p>
                )}
              </div>

              {/* Overall CLG */}
              <div className="border rounded p-4">
                <p className="text-xs text-gray-500 uppercase font-semibold mb-1">Overall CLG Score</p>
                {allDone ? (
                  <>
                    <p className="text-4xl font-bold text-blue-600 mb-1">{overallCLG}<span className="text-lg font-normal text-gray-400"> avg</span></p>
                    <p className={`text-sm font-semibold ${clgInterpret(parseFloat(overallCLG)).color}`}>{clgInterpret(parseFloat(overallCLG)).label}</p>
                  </>
                ) : (
                  <p className="text-gray-400 text-sm italic">
                    {completedScenarios.length === 0
                      ? 'Complete all 5 scenarios to see your score'
                      : `${completedScenarios.length} of 5 scenarios done`}
                  </p>
                )}
              </div>
            </div>

            {/* Per-scenario breakdown */}
            {completedScenarios.length > 0 && (
              <div>
                <p className="text-xs text-gray-500 uppercase font-semibold mb-2">Scenario Breakdown</p>
                <div className="space-y-2">
                  {completedScenarios.map(cs => {
                    const s = scenarios.find(sc => sc.id === cs.id);
                    const interp = clgInterpret(cs.clgScore);
                    return (
                      <div key={cs.id} className={`border rounded p-3 flex items-center justify-between ${interp.bg}`}>
                        <div className="flex items-center gap-2">
                          <span>{s.icon}</span>
                          <span className="text-sm font-medium text-gray-700">{s.title}</span>
                        </div>
                        <div className="text-right">
                          <span className={`text-lg font-bold ${interp.color}`}>{cs.clgScore}</span>
                          <span className={`text-xs ml-1 ${interp.color}`}>{interp.label}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* What is FSES */}
          <div className="bg-white shadow rounded p-6">
            <h3 className="text-lg font-bold mb-1">What is the FSES Score?</h3>
            <p className="text-xs text-gray-400 mb-3 italic">Based on Lown et al.'s Financial Self-Efficacy Scale</p>
            <p className="text-sm text-gray-700 mb-3">
              The <strong>Financial Self-Efficacy Scale (FSES)</strong> measures your belief in your own ability to manage financial decisions. It is rooted in Albert Bandura's Self-Efficacy Theory, which holds that confidence in a task directly shapes how we approach it — including whether we seek information, take risks, or freeze under pressure.
            </p>
            <p className="text-sm text-gray-700 mb-4">
              Your FSES score is the average of your three responses at the start of the session, each rated 1–5. A higher score indicates stronger financial self-belief going into the simulation.
            </p>
            <div className="grid grid-cols-3 gap-2 text-center text-xs">
              <div className="bg-red-50 border border-red-200 rounded p-2">
                <p className="font-bold text-red-600">1.0 – 2.9</p>
                <p className="text-gray-600 mt-1">Low Self-Efficacy</p>
                <p className="text-gray-500 mt-1">Tends to avoid financial decisions or defer to others</p>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded p-2">
                <p className="font-bold text-yellow-600">3.0 – 3.9</p>
                <p className="text-gray-600 mt-1">Moderate Self-Efficacy</p>
                <p className="text-gray-500 mt-1">Some confidence but often second-guesses decisions</p>
              </div>
              <div className="bg-green-50 border border-green-200 rounded p-2">
                <p className="font-bold text-green-600">4.0 – 5.0</p>
                <p className="text-gray-600 mt-1">High Self-Efficacy</p>
                <p className="text-gray-500 mt-1">Approaches financial decisions with confidence and initiative</p>
              </div>
            </div>
          </div>

          {/* What is CLG */}
          <div className="bg-white shadow rounded p-6">
            <h3 className="text-lg font-bold mb-1">What is the CLG Score?</h3>
            <p className="text-xs text-gray-400 mb-3 italic">Based on Kaiser & Menkhoff's Financial Literacy Confidence construct</p>
            <p className="text-sm text-gray-700 mb-3">
              The <strong>Confidence-Literacy Gap (CLG)</strong> measures the distance between how confident you feel about a financial decision and how competent that decision actually was. A large gap — in either direction — signals a calibration problem that can lead to real-world financial harm.
            </p>
            <div className="bg-gray-50 border rounded p-4 mb-4 font-mono text-sm text-center">
              <p className="text-gray-500 text-xs mb-1">Formula</p>
              <p><strong>CLG = |Confidence Score − Competence Score|</strong></p>
              <p className="text-xs text-gray-400 mt-2">Both scored on a 1–10 scale. Competence is derived from your actual portfolio return.</p>
            </div>
            <div className="grid grid-cols-3 gap-2 text-center text-xs mb-4">
              <div className="bg-green-50 border border-green-200 rounded p-2">
                <p className="font-bold text-green-600">0 – 2</p>
                <p className="text-gray-600 mt-1">Well Calibrated</p>
                <p className="text-gray-500 mt-1">Confidence aligns with actual performance</p>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded p-2">
                <p className="font-bold text-yellow-600">3 – 5</p>
                <p className="text-gray-600 mt-1">Moderate Gap</p>
                <p className="text-gray-500 mt-1">Some miscalibration — room to improve</p>
              </div>
              <div className="bg-red-50 border border-red-200 rounded p-2">
                <p className="font-bold text-red-600">6 – 8+</p>
                <p className="text-gray-600 mt-1">Large Gap</p>
                <p className="text-gray-500 mt-1">Significant over- or under-confidence</p>
              </div>
            </div>
            <div className="space-y-3">
              <div className="border-l-4 border-red-400 pl-3">
                <p className="text-sm font-semibold text-gray-800">Overconfidence (Confidence {'>'} Competence)</p>
                <p className="text-xs text-gray-600 mt-0.5">You felt more certain than the outcome warranted. This is the more dangerous pattern — overconfident investors tend to under-hedge, over-concentrate, and trade too frequently.</p>
              </div>
              <div className="border-l-4 border-yellow-400 pl-3">
                <p className="text-sm font-semibold text-gray-800">Underconfidence (Confidence {'<'} Competence)</p>
                <p className="text-xs text-gray-600 mt-0.5">Your strategy performed better than you expected. While less harmful, chronic underconfidence can cause investors to sit on the sidelines and miss growth opportunities.</p>
              </div>
            </div>
          </div>

          {/* How competence score is derived */}
          <div className="bg-white shadow rounded p-6">
            <h3 className="text-lg font-bold mb-3">How the Competence Score is Calculated</h3>
            <p className="text-sm text-gray-700 mb-4">After revealing the historical outcome, your portfolio's weighted return is mapped to a 1–10 Competence Score:</p>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border rounded">
                <thead className="bg-gray-50 text-gray-500 text-xs uppercase">
                  <tr>
                    <th className="text-left px-3 py-2">Portfolio Return</th>
                    <th className="text-left px-3 py-2">Competence Score</th>
                    <th className="text-left px-3 py-2">Interpretation</th>
                  </tr>
                </thead>
                <tbody className="divide-y text-xs">
                  <tr><td className="px-3 py-2 text-green-600 font-medium">Positive ({'>'} 0%)</td><td className="px-3 py-2 font-bold">9 / 10</td><td className="px-3 py-2 text-gray-600">Portfolio grew — strong allocation decision</td></tr>
                  <tr><td className="px-3 py-2 text-yellow-600 font-medium">Slight loss (0% to −3%)</td><td className="px-3 py-2 font-bold">5 / 10</td><td className="px-3 py-2 text-gray-600">Near-neutral — defensible allocation</td></tr>
                  <tr><td className="px-3 py-2 text-orange-500 font-medium">Moderate loss (−3% to −7%)</td><td className="px-3 py-2 font-bold">3 / 10</td><td className="px-3 py-2 text-gray-600">Meaningful loss — allocation could be improved</td></tr>
                  <tr><td className="px-3 py-2 text-red-600 font-medium">Large loss ({'<'} −7%)</td><td className="px-3 py-2 font-bold">1 / 10</td><td className="px-3 py-2 text-gray-600">Heavy loss — allocation was poorly suited to the scenario</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const [showAssessment, setShowAssessment]       = useState(true);
      const [baselineFSES, setBaselineFSES]           = useState(null);
      const [tab, setTab]                             = useState('simulation');
      const [simMode, setSimMode]                     = useState('historical');
      // { id, clgScore } for each completed historical scenario
      const [completedScenarios, setCompletedScenarios] = useState([]);
      const chartRef         = useRef(null);
      const chartInstanceRef = useRef(null);

      const completedIds = completedScenarios.map(s => s.id);
      const allDone      = completedScenarios.length === scenarios.length;
      const overallCLG   = allDone
        ? (completedScenarios.reduce((sum, s) => sum + s.clgScore, 0) / completedScenarios.length).toFixed(1)
        : null;

      const handleScenarioComplete = (id, clgScore) => {
        setCompletedScenarios(prev =>
          prev.find(s => s.id === id) ? prev : [...prev, { id, clgScore }]
        );
      };

      const pieData = {
        labels: ['Tech', 'Healthcare', 'Retail', 'Energy', 'Misc'],
        datasets: [{ data: [45, 25, 15, 10, 5], backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6'], borderWidth: 1 }],
      };

      useEffect(() => {
        if (tab === 'portfolio' && chartRef.current) {
          if (chartInstanceRef.current) chartInstanceRef.current.destroy();
          chartInstanceRef.current = new Chart(chartRef.current.getContext('2d'), {
            type: 'doughnut', data: pieData,
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } },
          });
        }
      }, [tab]);

      return (
        <>
          {showAssessment && <AssessmentModal onClose={avg => { setBaselineFSES(avg); setShowAssessment(false); }} />}
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center">
              <h1 className="text-3xl font-bold">Financial Litmus</h1>
              <div className="flex items-center gap-2">
                {baselineFSES !== null && (
                  <span className="text-sm text-gray-500 bg-white shadow rounded px-3 py-1">
                    FSES: <strong>{baselineFSES.toFixed(1)}</strong>/5
                  </span>
                )}
                {completedScenarios.length > 0 && !allDone && (
                  <span className="text-sm text-gray-500 bg-white shadow rounded px-3 py-1">
                    Scenarios: <strong>{completedScenarios.length}/{scenarios.length}</strong>
                  </span>
                )}
                {allDone && (
                  <span className="text-sm font-semibold bg-blue-500 text-white shadow rounded px-3 py-1">
                    Overall CLG: <strong>{overallCLG}</strong>
                  </span>
                )}
              </div>
            </div>

            <div className="space-x-2">
              {[
                { key: 'simulation', label: 'Simulation' },
                { key: 'scores',     label: 'My Scores' },
                { key: 'portfolio',  label: 'My Portfolio' },
                { key: 'news',       label: 'Daily News' },
              ].map(({ key, label }) => (
                <button key={key} onClick={() => setTab(key)}
                  className={`px-4 py-2 rounded ${tab === key ? 'bg-blue-500 text-white' : 'bg-gray-300'}`}>
                  {label}
                </button>
              ))}
            </div>

            {tab === 'simulation' && (
              <div className="space-y-4">
                <div className="flex gap-2">
                  <button onClick={() => setSimMode('historical')}
                    className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${simMode === 'historical' ? 'bg-blue-500 text-white' : 'bg-white border border-gray-300 text-gray-600 hover:border-blue-400'}`}>
                    Historical Replay
                  </button>
                  <button onClick={() => setSimMode('live')}
                    className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${simMode === 'live' ? 'bg-green-500 text-white' : 'bg-white border border-gray-300 text-gray-600 hover:border-green-400'}`}>
                    Live Market
                  </button>
                </div>
                {simMode === 'historical'
                  ? <SimulationTab baselineFSES={baselineFSES} completedIds={completedIds} onComplete={handleScenarioComplete} />
                  : <LiveMarketTab />
                }
              </div>
            )}

            {tab === 'scores' && (
              <ScoresTab
                baselineFSES={baselineFSES}
                completedScenarios={completedScenarios}
                overallCLG={overallCLG}
                allDone={allDone}
              />
            )}

            {tab === 'portfolio' && (
              <div className="bg-white shadow rounded p-4">
                <h2 className="text-xl font-semibold mb-4">Current Holdings</h2>
                <canvas ref={chartRef} width="300" height="300" />
              </div>
            )}

            {tab === 'news' && (
              <div className="bg-white shadow rounded p-4">
                <h2 className="text-xl font-semibold mb-4">Today's Headlines</h2>
                <ul className="space-y-2 text-sm">
                  <li>📊 Tech sector rebounds after dip</li>
                  <li>🛢️ Oil prices stabilize</li>
                  <li>🛒 Retail stocks show upward trend</li>
                </ul>
                <div className="mt-4">
                  <p className="font-medium text-sm">🧠 Quick Poll: Which sector is booming today?</p>
                  <input className="border px-2 py-1 rounded w-full mt-2 text-sm" placeholder="Type your answer..." />
                </div>
              </div>
            )}
          </div>
        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
