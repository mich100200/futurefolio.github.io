    // ── Adaptive Learning Plan Component ──────────────────────────────────────
    function AdaptiveLearningPlan({ baselineFSES, watchlist, onGoToPortfolio }) {
      const tier = baselineFSES !== null
        ? (baselineFSES >= 4 ? 'high' : baselineFSES >= 3 ? 'moderate' : 'low')
        : 'low';
      const plan        = LEARNING_PLANS[tier];
      const hasWatchlist = watchlist && watchlist.length > 0;
      const steps       = hasWatchlist ? generatePersonalizedSteps(watchlist, tier) : plan.steps;
      const stepCount   = steps.length;
      const stepsKey    = hasWatchlist
        ? 'fl_steps_' + tier + '_' + watchlist.map(s => s.ticker).sort().join('_')
        : 'fl_steps_' + tier;

      const [expanded,       setExpanded]       = useState(null);
      const [showPostForm,   setShowPostForm]    = useState(false);
      const [completedSteps, setCompletedSteps] = useState(() => {
        try { const v = localStorage.getItem(stepsKey); if (v) return JSON.parse(v); } catch {}
        return new Array(stepCount).fill(false);
      });
      const [postAnswers, setPostAnswers] = useState(() => {
        try { const v = localStorage.getItem('fl_post_answers'); if (v) return JSON.parse(v); } catch {}
        return {};
      });
      const [postScore, setPostScore] = useState(() => {
        try { const v = localStorage.getItem('fl_post_fses'); if (v) return parseFloat(v); } catch {}
        return null;
      });
      const [elapsed, setElapsed] = useState(() => {
        try { const v = localStorage.getItem('fl_session_start'); return v ? Date.now() - Number(v) : 0; } catch { return 0; }
      });

      // Sync completedSteps when stepsKey changes (tier or watchlist composition changes)
      React.useEffect(() => {
        try { const v = localStorage.getItem(stepsKey); if (v) { setCompletedSteps(JSON.parse(v)); return; } } catch {}
        setCompletedSteps(new Array(stepCount).fill(false));
      }, [stepsKey]);

      // Poll elapsed time every 30s; stop once unlocked
      React.useEffect(() => {
        const SESSION_MS = 20 * 60 * 1000;
        if (elapsed >= SESSION_MS) return;
        const id = setInterval(() => {
          try {
            const v = localStorage.getItem('fl_session_start');
            if (v) setElapsed(Date.now() - Number(v));
          } catch {}
        }, 30000);
        return () => clearInterval(id);
      }, [elapsed]);

      if (baselineFSES === null) return null;

      const doneCount = completedSteps.filter(Boolean).length;
      const allDone   = doneCount === stepCount;

      function toggleStep(i) {
        const next = completedSteps.map((v, idx) => idx === i ? !v : v);
        setCompletedSteps(next);
        try { localStorage.setItem(stepsKey, JSON.stringify(next)); } catch {}
      }

      function submitPostFSES() {
        const vals = FSES_QUESTIONS.map((_, i) => Number(postAnswers[i] || 0));
        if (vals.some(v => !v)) return;
        const avg     = vals.reduce((a, b) => a + b, 0) / vals.length;
        const rounded = Math.round(avg * 10) / 10;
        setPostScore(rounded);
        setShowPostForm(false);
        try {
          localStorage.setItem('fl_post_fses', String(rounded));
          localStorage.setItem('fl_post_answers', JSON.stringify(postAnswers));
        } catch {}
      }

      const fsesLabel = (score) => {
        if (score >= 4) return { label: 'High',     color: 'text-green-600' };
        if (score >= 3) return { label: 'Moderate', color: 'text-yellow-600' };
        return               { label: 'Low',       color: 'text-red-500' };
      };

      // Investment performance from saved allocation
      const allocKey  = watchlist && watchlist.length > 0
        ? 'fl_alloc_' + watchlist.map(s => s.ticker).sort().join('_')
        : null;
      const allocData = (() => {
        if (!allocKey) return null;
        try { const v = localStorage.getItem(allocKey); return v ? JSON.parse(v) : null; } catch { return null; }
      })();
      const isAllocLocked = (() => {
        if (!allocKey) return false;
        try { return localStorage.getItem(allocKey + '_locked') === 'true'; } catch { return false; }
      })();

      return (
        <div className={`bg-white shadow rounded p-6 border-t-4 ${plan.borderColor}`}>
          {/* Header */}
          <div className="flex items-start justify-between mb-1">
            <h3 className="text-lg font-bold text-gray-800">Your Adaptive Learning Plan</h3>
            <span className={`text-xs font-semibold px-2 py-1 rounded ${plan.tagBg}`}>{plan.tier}</span>
          </div>
          <p className="text-xs text-gray-400 italic mb-3">Personalized based on your FSES score · Grounded in Bandura's Self-Efficacy Theory</p>
          <p className="text-sm text-gray-600 mb-4 leading-relaxed">
            {hasWatchlist ? (() => {
              const names = watchlist.map(s => s.name || s.ticker).join(', ');
              const intros = {
                low:      `A score below 3.0 means financial decisions still feel uncertain — and that's exactly why this pathway starts with what you already own. You'll build genuine understanding of ${names} from the ground up: what these companies do, why their sectors matter, and how to read their price movements without anxiety.`,
                moderate: `You have a solid foundation. This pathway uses your actual holdings — ${names} — as the laboratory. Every exercise is grounded in real companies you chose and real data from the past week, not generic examples.`,
                high:     `Strong confidence is the starting point, not the destination. This pathway uses ${names} to test whether your confidence is calibrated. Every step asks you to go deeper, argue the opposite side, and quantify what you actually know versus what you're assuming.`,
              };
              return intros[tier];
            })() : plan.intro}
          </p>

          {/* Progress bar */}
          <div className="mb-5">
            <div className="flex justify-between text-xs text-gray-500 mb-1.5">
              <span>{doneCount} of {stepCount} steps complete</span>
              {allDone && <span className="text-green-600 font-semibold">All done!</span>}
            </div>
            <div className="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
              <div
                className={`h-2.5 rounded-full transition-all duration-500 ${allDone ? 'bg-green-500' : 'bg-blue-500'}`}
                style={{ width: `${(doneCount / stepCount) * 100}%` }}
              />
            </div>
          </div>

          {/* Steps — accordion with checkboxes */}
          <div className="space-y-3">
            {steps.map((step, i) => (
              <div key={i} className={`border rounded-lg overflow-hidden transition-colors ${completedSteps[i] ? 'border-green-200' : 'border-gray-200'}`}>
                <div className="flex items-stretch">
                  {/* Checkbox zone */}
                  <button
                    onClick={() => toggleStep(i)}
                    className={`flex-shrink-0 flex items-center justify-center w-12 border-r transition-colors ${completedSteps[i] ? 'bg-green-50 border-green-200 hover:bg-green-100' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                    title={completedSteps[i] ? 'Mark incomplete' : 'Mark complete'}
                  >
                    {completedSteps[i]
                      ? <span className="text-green-600 text-lg font-bold">✓</span>
                      : <span className="w-5 h-5 rounded border-2 border-gray-300 inline-block" />
                    }
                  </button>

                  {/* Accordion toggle */}
                  <button
                    onClick={() => setExpanded(expanded === i ? null : i)}
                    className={`flex-1 text-left px-4 py-3 flex items-center justify-between gap-3 transition-colors ${completedSteps[i] ? 'bg-green-50 hover:bg-green-100' : 'hover:bg-gray-50'}`}
                  >
                    <div className="flex items-center gap-3">
                      <span className="text-xl">{step.icon}</span>
                      <div>
                        <p className={`text-sm font-semibold ${completedSteps[i] ? 'line-through text-gray-400' : 'text-gray-800'}`}>{step.title}</p>
                        <span className={`text-xs font-medium px-2 py-0.5 rounded ${plan.tagBg}`}>{step.tag}</span>
                      </div>
                    </div>
                    <span className="text-gray-400 text-sm flex-shrink-0">{expanded === i ? '▲' : '▼'}</span>
                  </button>
                </div>

                {expanded === i && (
                  <div className="px-4 pb-5 pt-3 bg-gray-50 border-t space-y-4">
                    {step.desc && <p className="text-sm text-gray-700 leading-relaxed">{step.desc}</p>}
                    {step.objective && (
                      <div>
                        <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">Objective</p>
                        <p className="text-sm text-gray-700 leading-relaxed">{step.objective}</p>
                      </div>
                    )}
                    {step.actions && (
                      <div>
                        <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Your Actions</p>
                        <ul className="space-y-2.5">
                          {step.actions.map((action, j) => (
                            <li key={j} className="flex items-start gap-3 text-sm text-gray-700">
                              <span className={`mt-0.5 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center flex-shrink-0 ${plan.tagBg}`}>{j + 1}</span>
                              <span className="leading-relaxed">{action}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {step.reflection && (
                      <div className="bg-blue-50 border border-blue-100 rounded-lg p-3.5">
                        <p className="text-xs font-bold text-blue-500 uppercase tracking-wide mb-1.5">Reflect</p>
                        <p className="text-sm text-blue-900 italic leading-relaxed">{step.reflection}</p>
                      </div>
                    )}
                    {step.why && (
                      <div className="bg-white border border-gray-200 rounded-lg p-3.5">
                        <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Why This Works</p>
                        <p className="text-xs text-gray-600 leading-relaxed">{step.why}</p>
                      </div>
                    )}
                    <div className="pt-1">
                      <button
                        onClick={() => { toggleStep(i); setExpanded(null); }}
                        className={`text-sm font-semibold px-4 py-2 rounded-lg transition-colors ${completedSteps[i] ? 'bg-gray-100 text-gray-500 hover:bg-gray-200' : 'bg-green-500 text-white hover:bg-green-600'}`}
                      >
                        {completedSteps[i] ? 'Mark as Incomplete' : 'Mark as Complete ✓'}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Investment Performance — unlocked after all steps done */}
          {allDone && allocData && isAllocLocked && watchlist && watchlist.length > 0 && (() => {
            const rows = watchlist.map(s => {
              const allocated    = Number(allocData[s.ticker] || 0);
              const changePct    = s.changePct || 0;
              const currentValue = allocated * (1 + changePct / 100);
              const gain         = currentValue - allocated;
              return { ticker: s.ticker, name: s.name || s.ticker, allocated, currentValue, gain, changePct };
            });
            const totalAllocated = rows.reduce((sum, r) => sum + r.allocated, 0);
            const totalCurrent   = rows.reduce((sum, r) => sum + r.currentValue, 0);
            const totalGain      = totalCurrent - totalAllocated;
            return (
              <div className="mt-6 border-t pt-5">
                <h4 className="text-base font-bold text-gray-800 mb-1">Your 1-Week Investment Performance</h4>
                <p className="text-xs text-gray-400 mb-1">
                  If you had invested your virtual $1,000 one week ago in these proportions, here's what would have happened.
                </p>
                {watchlist[0] && watchlist[0].weekAgoDate && (
                  <p className="text-xs text-blue-500 font-medium mb-4">
                    Period: {watchlist[0].weekAgoDate} → {watchlist[0].currentDate} (7 trading days of real market data)
                  </p>
                )}
                <div className="space-y-3">
                  {rows.map(r => (
                    <div key={r.ticker} className="bg-gray-50 border rounded-lg p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-gray-500 bg-gray-200 px-1.5 py-0.5 rounded">{r.ticker}</span>
                          <span className="text-sm text-gray-700 truncate max-w-32">{r.name}</span>
                        </div>
                        <span className={`text-sm font-bold ${r.gain >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                          {r.gain >= 0 ? '+' : ''}${r.gain.toFixed(2)}
                        </span>
                      </div>
                      <div className="flex items-center justify-between text-xs text-gray-500">
                        <span>Invested: <strong>${r.allocated.toFixed(2)}</strong></span>
                        <span>Value now: <strong>${r.currentValue.toFixed(2)}</strong></span>
                        <span className={`font-semibold ${r.changePct >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                          {r.changePct >= 0 ? '+' : ''}{r.changePct.toFixed(2)}% (7d)
                        </span>
                      </div>
                    </div>
                  ))}
                  <div className={`rounded-lg p-4 flex items-center justify-between ${totalGain >= 0 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                    <div>
                      <p className="text-xs text-gray-500 mb-0.5">Total Portfolio Value</p>
                      <p className="text-2xl font-bold text-gray-800">${totalCurrent.toFixed(2)}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-xs text-gray-500 mb-0.5">Overall Gain / Loss</p>
                      <p className={`text-xl font-bold ${totalGain >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                        {totalGain >= 0 ? '+' : ''}${totalGain.toFixed(2)}
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Post-FSES Assessment — unlocked after all steps done OR 20-minute time gate */}
          {(allDone || elapsed >= 20 * 60 * 1000) && (
            <div className="mt-6 border-t pt-5">
              <h4 className="text-base font-bold text-gray-800 mb-1">Post-Learning FSES Assessment</h4>
              <p className="text-sm text-gray-500 mb-4">
                {allDone
                  ? "You've completed the learning pathway — retake the self-efficacy assessment to see how your confidence has grown."
                  : "You've spent time with the platform and your portfolio data. Retake the self-efficacy assessment to measure any shift in your financial confidence."}
              </p>

              {postScore !== null ? (
                <div className="space-y-4">
                  <div className="grid grid-cols-3 gap-3 text-center">
                    <div className="bg-gray-50 border rounded-lg p-4">
                      <p className="text-xs text-gray-400 mb-1">Before</p>
                      <p className="text-3xl font-bold text-gray-800">{baselineFSES.toFixed(1)}</p>
                      <p className={`text-xs font-semibold mt-1 ${fsesLabel(baselineFSES).color}`}>{fsesLabel(baselineFSES).label}</p>
                    </div>
                    <div className={`rounded-lg p-4 flex flex-col items-center justify-center border ${(postScore - baselineFSES) >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                      <p className="text-xs text-gray-400 mb-1">Change</p>
                      <p className={`text-3xl font-bold ${(postScore - baselineFSES) >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                        {(postScore - baselineFSES) >= 0 ? '+' : ''}{(postScore - baselineFSES).toFixed(1)}
                      </p>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                      <p className="text-xs text-gray-400 mb-1">After</p>
                      <p className="text-3xl font-bold text-blue-700">{postScore.toFixed(1)}</p>
                      <p className={`text-xs font-semibold mt-1 ${fsesLabel(postScore).color}`}>{fsesLabel(postScore).label}</p>
                    </div>
                  </div>
                  <div className="bg-blue-50 border border-blue-100 rounded-lg p-4">
                    <p className="text-sm text-blue-900 leading-relaxed">
                      {postScore > baselineFSES
                        ? `Your financial self-efficacy improved by ${(postScore - baselineFSES).toFixed(1)} points. Engaging with real market data and structured reflection is working — keep building on this momentum.`
                        : postScore === baselineFSES
                        ? "Your score held steady. That's normal — self-efficacy shifts gradually. Continue working through the activities and retake to track your progress over time."
                        : "Your score dipped slightly. This can happen when new knowledge reveals gaps you weren't aware of before — that's actually a sign of growth. Keep going."}
                    </p>
                  </div>
                  <NextStepsCard
                    delta={postScore - baselineFSES}
                    onGoToLearningPath={null}
                    onGoToPortfolio={onGoToPortfolio}
                  />
                  <button
                    onClick={() => {
                      setPostScore(null);
                      setPostAnswers({});
                      setShowPostForm(true);
                      try { localStorage.removeItem('fl_post_fses'); localStorage.removeItem('fl_post_answers'); } catch {}
                    }}
                    className="text-xs text-gray-400 hover:text-gray-600 underline mt-1 block"
                  >Retake assessment</button>
                </div>
              ) : showPostForm ? (
                <div className="space-y-4">
                  {FSES_QUESTIONS.map((q, i) => (
                    <div key={i} className="bg-gray-50 border rounded-lg p-4">
                      <p className="text-xs text-gray-400 mb-1">Question {i + 1} of {FSES_QUESTIONS.length}</p>
                      <p className="text-sm font-medium text-gray-800 mb-3">"{q}"</p>
                      <div className="flex gap-2 flex-wrap">
                        {[1,2,3,4,5].map(val => (
                          <button
                            key={val}
                            onClick={() => setPostAnswers(prev => ({ ...prev, [i]: val }))}
                            className={`w-10 h-10 rounded-lg border-2 text-sm font-bold transition-colors ${postAnswers[i] === val ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-gray-300 text-gray-700 hover:border-blue-400'}`}
                          >{val}</button>
                        ))}
                      </div>
                      <div className="flex justify-between text-xs text-gray-400 mt-1.5">
                        <span>Not at all confident</span>
                        <span>Completely confident</span>
                      </div>
                    </div>
                  ))}
                  <div className="flex gap-3">
                    <button
                      onClick={submitPostFSES}
                      disabled={FSES_QUESTIONS.some((_, i) => !postAnswers[i])}
                      className="px-5 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                    >See My Results</button>
                    <button
                      onClick={() => setShowPostForm(false)}
                      className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700"
                    >Cancel</button>
                  </div>
                </div>
              ) : (
                <button
                  onClick={() => setShowPostForm(true)}
                  className="px-5 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors"
                >Take Post-Assessment →</button>
              )}
            </div>
          )}

          <p className="text-xs text-gray-400 mt-5 italic">
            This plan adapts as your confidence grows. Retake the FSES assessment at any time to unlock a new path.
          </p>
        </div>
      );
    }

    // ── Portfolio Health Score ────────────────────────────────────────────────
    const SPY_CACHE_KEY = 'fl_spy_cache';
    const SPY_TTL_MS    = 6 * 60 * 60 * 1000; // 6-hour cache so we don't burn daily quota

    function PortfolioHealthScore({ watchlist, onGoToLearningPath }) {
      const [spyChange, setSpyChange] = useState(() => {
        try {
          const c = JSON.parse(localStorage.getItem(SPY_CACHE_KEY) || 'null');
          if (c && Date.now() - c.fetchedAt < SPY_TTL_MS) return c.changePct;
        } catch {}
        return null;
      });

      useEffect(() => {
        if (spyChange !== null) return;
        fetchWeeklyData('SPY')
          .then(data => {
            setSpyChange(data.changePct);
            try { localStorage.setItem(SPY_CACHE_KEY, JSON.stringify({ changePct: data.changePct, fetchedAt: Date.now() })); } catch {}
          })
          .catch(() => {}); // silent fail — benchmark line is optional
      }, []);

      const allocKey  = 'fl_alloc_' + watchlist.map(s => s.ticker).sort().join('_');
      const allocData = (() => { try { const v = localStorage.getItem(allocKey); return v ? JSON.parse(v) : null; } catch { return null; } })();

      // 1. Sector diversification — -30 if all stocks share one sector
      const sectors       = watchlist.map(s => getSector(s.ticker));
      const uniqueSectors = [...new Set(sectors)];
      const sectorPenalty = uniqueSectors.length === 1 ? 30 : 0;

      // 2. Volatility spread — -20 if one stock moved >5pp more than the others
      const absChanges = watchlist.map(s => Math.abs(s.changePct || 0));
      const volMax     = Math.max(...absChanges);
      const volMin     = Math.min(...absChanges);
      const volPenalty = (volMax - volMin) > 5 ? 20 : 0;

      // 3. Allocation balance — -20 if any single stock gets ≥90%
      let allocPenalty = 0;
      let heaviestTicker = null;
      let heaviestPct    = 0;
      if (allocData) {
        const allocTotal = watchlist.reduce((sum, s) => sum + (Number(allocData[s.ticker]) || 0), 0);
        if (allocTotal > 0) {
          watchlist.forEach(s => {
            const pct = (Number(allocData[s.ticker]) || 0) / allocTotal * 100;
            if (pct >= 90) { allocPenalty = 20; heaviestTicker = s.ticker; heaviestPct = pct; }
          });
        }
      }

      const score = Math.max(0, 100 - sectorPenalty - volPenalty - allocPenalty);

      const { ring, bg, text, badge } = score >= 70
        ? { ring: 'border-green-400',  bg: 'bg-green-50',  text: 'text-green-600',  badge: 'Healthy'  }
        : score >= 40
        ? { ring: 'border-yellow-400', bg: 'bg-yellow-50', text: 'text-yellow-600', badge: 'Fair'     }
        : { ring: 'border-red-400',    bg: 'bg-red-50',    text: 'text-red-500',    badge: 'At Risk'  };

      let explanation = '';
      if (sectorPenalty) {
        explanation = `Your portfolio is concentrated in ${uniqueSectors[0]}. Consider adding a stock from a different sector to reduce risk.`;
      } else if (allocPenalty) {
        explanation = `${heaviestTicker} holds ${heaviestPct.toFixed(0)}% of your portfolio. Spreading your allocation more evenly reduces single-stock exposure.`;
      } else if (volPenalty) {
        const maxStock = watchlist.find(s => Math.abs(s.changePct || 0) === volMax);
        const minStock = watchlist.find(s => Math.abs(s.changePct || 0) === volMin);
        explanation = `${maxStock ? maxStock.ticker : ''} moved ${volMax.toFixed(1)}% this week while ${minStock ? minStock.ticker : ''} moved ${volMin.toFixed(1)}% — high spread adds unpredictable risk.`;
      } else {
        explanation = 'Well-balanced — diversified sectors, even allocation, and similar price movements this week.';
      }

      // Weighted portfolio return (uses locked allocation if available, else equal weight)
      const allocTotal = allocData
        ? watchlist.reduce((sum, s) => sum + (Number(allocData[s.ticker]) || 0), 0)
        : 0;
      const portfolioReturn = allocTotal > 0
        ? watchlist.reduce((sum, s) => sum + (Number(allocData[s.ticker]) / allocTotal) * (s.changePct || 0), 0)
        : watchlist.reduce((sum, s) => sum + (s.changePct || 0), 0) / watchlist.length;

      const fmtPct = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
      const beatMarket  = spyChange !== null && portfolioReturn > spyChange;
      const trailMarket = spyChange !== null && portfolioReturn < spyChange;

      return (
        <div className={`${bg} border rounded-xl p-5`}>
          <div className="flex items-center gap-5">
            <div className={`flex-shrink-0 w-20 h-20 rounded-full border-4 ${ring} flex flex-col items-center justify-center`}>
              <span className={`text-2xl font-bold leading-none ${text}`}>{score}</span>
              <span className={`text-xs font-semibold mt-0.5 ${text}`}>{badge}</span>
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-semibold text-gray-800 mb-1">Portfolio Health Score</p>
              <p className="text-sm text-gray-600 leading-snug">{explanation}</p>
              {score < 70 && (
                <button onClick={onGoToLearningPath} className="text-xs text-blue-500 hover:underline mt-2">
                  Your learning plan has steps to address this →
                </button>
              )}
            </div>
          </div>
          {spyChange !== null && (
            <div className="mt-4 pt-3 border-t border-gray-200 flex flex-wrap items-center gap-x-2 gap-y-1 text-sm">
              <span className="text-gray-500">Your portfolio:</span>
              <span className={`font-semibold ${portfolioReturn >= 0 ? 'text-green-600' : 'text-red-500'}`}>{fmtPct(portfolioReturn)}</span>
              <span className="text-gray-300">|</span>
              <span className="text-gray-500">S&amp;P 500 this week:</span>
              <span className={`font-semibold ${spyChange >= 0 ? 'text-green-600' : 'text-red-500'}`}>{fmtPct(spyChange)}</span>
              <span className="text-gray-300">→</span>
              <span className={`font-semibold ${beatMarket ? 'text-green-700' : trailMarket ? 'text-red-600' : 'text-gray-600'}`}>
                {beatMarket ? 'You beat the market' : trailMarket ? 'Market outperformed you' : 'Matched the market'}
              </span>
            </div>
          )}
        </div>
      );
    }

    // ── Allocation Section ────────────────────────────────────────────────────
    function AllocationSection({ watchlist }) {
      const BUDGET     = 1000;
      const storeKey   = 'fl_alloc_' + watchlist.map(s => s.ticker).sort().join('_');
      const lockedKey  = storeKey + '_locked';

      const [amounts, setAmounts] = useState(() => {
        try { const v = localStorage.getItem(storeKey); if (v) return JSON.parse(v); } catch {}
        return Object.fromEntries(watchlist.map(s => [s.ticker, '']));
      });
      const [locked, setLocked] = useState(() => {
        try { return localStorage.getItem(lockedKey) === 'true'; } catch { return false; }
      });

      useEffect(() => { try { localStorage.setItem(storeKey,  JSON.stringify(amounts)); } catch {} }, [JSON.stringify(amounts)]);
      useEffect(() => {
        try { localStorage.setItem(lockedKey, String(locked)); } catch {}
        // Timer starts only once the $1k allocation is confirmed — stamp now if not already set
        if (locked) {
          try { if (!localStorage.getItem('fl_session_start')) localStorage.setItem('fl_session_start', String(Date.now())); } catch {}
        }
      }, [locked]);

      const total   = watchlist.reduce((sum, s) => sum + (Number(amounts[s.ticker]) || 0), 0);
      const remaining = BUDGET - total;
      const isOver    = total > BUDGET;
      const canConfirm = total > 0 && !isOver;

      const update = (ticker, val) => {
        const num = val === '' ? '' : Math.max(0, Number(val));
        setAmounts(prev => ({ ...prev, [ticker]: num }));
      };

      // ── Confirmed summary ──
      if (locked) {
        return (
          <div className="bg-white shadow rounded-lg p-5">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h3 className="text-base font-bold text-gray-800">Your Portfolio Allocation</h3>
                <p className="text-xs text-gray-400 mt-0.5">
                  ${total.toFixed(0)} invested one week ago · {remaining > 0 ? `$${remaining.toFixed(0)} held as cash · ` : ''}complete the learning pathway to see results
                </p>
              </div>
              <button
                onClick={() => setLocked(false)}
                className="text-xs text-blue-500 border border-blue-200 rounded px-2.5 py-1 hover:bg-blue-50 transition-all"
              >
                Edit
              </button>
            </div>

            <div className="space-y-4">
              {watchlist.map(s => {
                const amt    = Number(amounts[s.ticker]) || 0;
                const pct    = total > 0 ? (amt / total) * 100 : 0;
                const shares = amt > 0 ? amt / s.current : 0;
                return (
                  <div key={s.ticker}>
                    <div className="flex items-center justify-between mb-1.5">
                      <div className="flex items-center gap-2">
                        <Tooltip tip="A ticker symbol is a short abbreviation that uniquely identifies a publicly traded company on a stock exchange.">
                          <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded">{s.ticker}</span>
                        </Tooltip>
                        {s.name && <span className="text-sm text-gray-600">{s.name}</span>}
                      </div>
                      <div className="text-right">
                        <span className="text-sm font-bold text-gray-800">${amt.toFixed(0)}</span>
                        <span className="text-xs text-gray-400 ml-2">≈ {shares.toFixed(3)} shares</span>
                      </div>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2">
                      <div className="bg-blue-500 h-2 rounded-full transition-all" style={{ width: `${pct}%` }} />
                    </div>
                    <p className="text-xs text-gray-400 mt-0.5">{pct.toFixed(1)}% of invested portfolio</p>
                  </div>
                );
              })}
            </div>

            {/* Sector breakdown — only when something is actually allocated */}
            {total > 0 && (() => {
              const groups = {};
              watchlist.forEach(s => {
                const amt = Number(amounts[s.ticker]) || 0;
                if (amt <= 0) return;
                const sector = getSector(s.ticker);
                if (!groups[sector]) groups[sector] = { tickers: [], amount: 0 };
                groups[sector].tickers.push(s.ticker);
                groups[sector].amount += amt;
              });
              const rows = Object.entries(groups)
                .map(([sector, d]) => ({ sector, tickers: d.tickers, pct: d.amount / total * 100 }))
                .sort((a, b) => b.pct - a.pct);

              if (rows.length === 0) return null;

              return (
                <div className="mt-5 pt-4 border-t">
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Sector Breakdown</p>
                  <div className="space-y-3">
                    {rows.map(r => {
                      const over = r.pct > 60;
                      return (
                        <div key={r.sector}>
                          <div className="flex items-center justify-between text-xs mb-1.5">
                            <span className="font-medium text-gray-700">
                              {r.sector}
                              <span className="text-gray-400 font-normal ml-1.5">({r.tickers.join(' + ')})</span>
                            </span>
                            <div className="flex items-center gap-2">
                              <span className={`font-bold ${over ? 'text-red-600' : 'text-gray-700'}`}>{r.pct.toFixed(0)}%</span>
                              <span className={`text-xs font-semibold px-1.5 py-0.5 rounded-full ${over ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>
                                {over ? 'Concentrated' : 'Diversified'}
                              </span>
                            </div>
                          </div>
                          <div className="w-full bg-gray-100 rounded-full h-3">
                            <div
                              className={`h-3 rounded-full transition-all duration-500 ${over ? 'bg-red-400' : 'bg-blue-400'}`}
                              style={{ width: `${r.pct}%` }}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            <div className="mt-4 pt-3 border-t flex justify-between items-center">
              <span className="text-sm text-gray-500">Total invested</span>
              <span className="text-sm font-bold text-gray-800">${total.toFixed(0)} <span className="font-normal text-gray-400">/ $1,000</span></span>
            </div>
          </div>
        );
      }

      // ── Input view ──
      return (
        <div className="bg-white shadow rounded-lg p-5">
          <div className="flex items-start justify-between mb-1">
            <div>
              <h3 className="text-base font-bold text-gray-800">Allocate Your Virtual $1,000</h3>
              <p className="text-xs text-gray-400 mt-0.5">
                Imagine you invested this money one week ago. Decide how to split it across your stocks — then complete the learning pathway to see how you would have done.
              </p>
            </div>
            <span className={`text-sm font-bold flex-shrink-0 ml-4 ${isOver ? 'text-red-500' : 'text-gray-600'}`}>
              {isOver ? `-$${(total - BUDGET).toFixed(0)} over` : `$${remaining.toFixed(0)} left`}
            </span>
          </div>

          {/* Budget progress bar */}
          <div className="w-full bg-gray-100 rounded-full h-2 mt-3 mb-5">
            <div
              className={`h-2 rounded-full transition-all duration-200 ${isOver ? 'bg-red-400' : 'bg-blue-500'}`}
              style={{ width: `${Math.min(100, (total / BUDGET) * 100)}%` }}
            />
          </div>

          <div className="space-y-3 mb-5">
            {watchlist.map(s => {
              const amt    = Number(amounts[s.ticker]) || 0;
              const shares = amt > 0 ? amt / s.current : 0;
              const pct    = total > 0 ? (amt / total) * 100 : 0;
              return (
                <div key={s.ticker} className="border rounded-lg p-4">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <Tooltip tip="A ticker symbol is a short abbreviation that uniquely identifies a publicly traded company on a stock exchange.">
                        <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded">{s.ticker}</span>
                      </Tooltip>
                      {s.name && <span className="text-sm font-medium text-gray-700">{s.name}</span>}
                    </div>
                    <Tooltip tip="The most recent closing price per share for this stock.">
                      <span className="text-xs text-gray-400 cursor-help border-b border-dashed border-gray-300">${s.current.toFixed(2)} / share</span>
                    </Tooltip>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-gray-400 font-medium text-sm">$</span>
                    <input
                      type="number"
                      min="0"
                      max={BUDGET}
                      step="10"
                      value={amounts[s.ticker]}
                      onChange={e => update(s.ticker, e.target.value)}
                      placeholder="0"
                      className="border rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:ring-2 focus:ring-blue-300 text-gray-800"
                    />
                    {amt > 0 && (
                      <span className="text-xs text-gray-500">
                        <Tooltip tip="The number of shares you would receive for this dollar amount at the current price. Fractional shares are shown since this is a virtual portfolio.">
                          <span className="border-b border-dashed border-gray-300">≈ {shares.toFixed(3)} shares</span>
                        </Tooltip>
                        {total > 0 && (
                          <span className="ml-2 text-gray-400">({pct.toFixed(0)}%)</span>
                        )}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <button
            onClick={() => canConfirm && setLocked(true)}
            disabled={!canConfirm}
            className={`w-full py-2.5 rounded-lg font-semibold text-sm transition-all ${
              canConfirm
                ? 'bg-blue-500 text-white hover:bg-blue-600'
                : isOver
                ? 'bg-red-100 text-red-500 cursor-not-allowed'
                : 'bg-gray-200 text-gray-400 cursor-not-allowed'
            }`}
          >
            {total === 0
              ? 'Enter amounts to allocate'
              : isOver
              ? `Over budget by $${(total - BUDGET).toFixed(0)} — reduce to continue`
              : 'Confirm Allocation'}
          </button>
        </div>
      );
    }

    // ── Round Transition Modal ────────────────────────────────────────────────
    function RoundTransitionModal({ lastRound, onCarryOver, onRetake }) {
      const overconfident  = lastRound.calibration.filter(c => c.status === 'overconfident');
      const underconfident = lastRound.calibration.filter(c => c.status === 'underconfident');

      const calParts = [];
      if (overconfident.length)  calParts.push(`overconfident on ${overconfident.map(c => c.ticker).join(' and ')}`);
      if (underconfident.length) calParts.push(`underconfident on ${underconfident.map(c => c.ticker).join(' and ')}`);
      const calSentence = calParts.length
        ? `You were ${calParts.join(', and ')}. Keep that pattern in mind as you pick this time.`
        : 'Your allocation matched your stock performance well — you were well-calibrated last round.';

      const statusStyle = s =>
        s === 'overconfident'  ? 'bg-red-100 text-red-600'  :
        s === 'underconfident' ? 'bg-blue-100 text-blue-600' :
                                 'bg-green-100 text-green-600';
      const statusLabel = s =>
        s === 'overconfident' ? 'Over' : s === 'underconfident' ? 'Under' : 'On target';

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 space-y-5">

            <div>
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-0.5">Round {lastRound.round} Complete</p>
              <h2 className="text-xl font-bold text-gray-800">Ready for Round {lastRound.round + 1}</h2>
            </div>

            {/* Conviction calibration recap */}
            {lastRound.calibration.length > 0 && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                <p className="text-xs font-semibold text-amber-700 uppercase tracking-wide mb-2">Conviction Calibration — Last Round</p>
                <p className="text-sm text-amber-900 leading-relaxed mb-3">{calSentence}</p>
                <div className="space-y-2">
                  {lastRound.calibration.map(c => (
                    <div key={c.ticker} className="flex items-center justify-between text-xs">
                      <span className="font-bold text-gray-700 w-12">{c.ticker}</span>
                      <span className="text-gray-500">{c.allocPct}% allocated</span>
                      <span className={c.changePct >= 0 ? 'text-green-600 font-medium' : 'text-red-500 font-medium'}>
                        {c.changePct >= 0 ? '+' : ''}{c.changePct.toFixed(2)}% return
                      </span>
                      <span className={`font-semibold px-2 py-0.5 rounded-full text-xs ${statusStyle(c.status)}`}>
                        {statusLabel(c.status)}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* FSES carry-over prompt */}
            <div className="bg-gray-50 border rounded-xl p-4">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Starting Score for Round {lastRound.round + 1}</p>
              <p className="text-sm text-gray-700 leading-relaxed mb-4">
                Your Round {lastRound.round} post-score was <strong className="text-gray-900">{lastRound.postFSES?.toFixed(1)}</strong>.
                {' '}Use it as your Round {lastRound.round + 1} baseline, or retake the full assessment fresh?
                {' '}<span className="text-gray-400 text-xs">(Retaking gives you a clean comparison point.)</span>
              </p>
              <div className="flex gap-3">
                <button
                  onClick={onCarryOver}
                  className="flex-1 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors"
                >Use {lastRound.postFSES?.toFixed(1)} as my baseline</button>
                <button
                  onClick={onRetake}

    // ── Scores Tab ─────────────────────────────────────────────────────────────
    function ScoresTab({ baselineFSES, participantFlags, onGoToLearningPath, onGoToPortfolio, rounds }) {

        if (score >= 4) return { label: 'High Self-Efficacy',     color: 'text-green-600',  bg: 'bg-green-50 border-green-200' };

      };

      const fsesLabelShort = s => s >= 4 ? { label: 'High', color: 'text-green-600' } : s >= 3 ? { label: 'Moderate', color: 'text-yellow-600' } : { label: 'Low', color: 'text-red-500' };

      return (
        <div className="space-y-5">

          {/* Round progression — shown once at least one round is archived */}

                            <p className="text-xs text-gray-400">Start</p>
                            <p className={`text-lg font-bold ${fsesLabelShort(r.preFSES).color}`}>{r.preFSES.toFixed(1)}</p>

                          <span className="text-gray-300 text-lg">→</span>
                          {r.postFSES !== null ? (

                                <p className={`text-lg font-bold ${fsesLabelShort(r.postFSES).color}`}>{r.postFSES.toFixed(1)}</p>

                        {r.calibration && r.calibration.some(c => c.status !== 'calibrated') && (

                              <span key={c.ticker} className={`text-xs px-1.5 py-0.5 rounded-full font-semibold ${c.status === 'overconfident' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>

          <div className="bg-white shadow rounded p-6">
            <h2 className="text-xl font-bold mb-1">Your FSES Score</h2>
            <p className="text-gray-500 text-sm mb-5">Recorded at the start of your session.</p>
            {baselineFSES !== null ? (() => {
              const interp = fsesInterpret(baselineFSES);
              const flagged = participantFlags && (participantFlags.isFinanceMajor || participantFlags.hasBrokerage);
              const flagDetails = participantFlags ? [
                participantFlags.isFinanceMajor && 'finance / accounting background',
                participantFlags.hasBrokerage   && 'active brokerage account',
              ].filter(Boolean) : [];
              return (
                <>
                  <div className={`border rounded p-5 flex items-center gap-5 ${interp.bg}`}>
                    <div className="text-center min-w-fit">
                      <p className="text-5xl font-bold text-gray-800">{baselineFSES.toFixed(1)}</p>
                      <p className="text-sm text-gray-400 mt-1">out of 5</p>
                    </div>
                    <div>
                      <p className={`text-lg font-bold mb-1 ${interp.color}`}>{interp.label}</p>
                      <p className="text-sm text-gray-600">
                        {baselineFSES >= 4
                          ? 'You approach financial decisions with strong confidence and initiative. The goal is to ensure that confidence is well-founded and continues to be refined through experience.'
                          : baselineFSES >= 3
                          ? 'You have a reasonable baseline of financial confidence but still second-guess yourself at times. Structured exposure to real financial scenarios can help close that gap.'
                          : 'You tend to avoid or defer financial decisions due to low confidence. Building foundational knowledge and celebrating small wins can significantly shift this over time.'

                    </div>
                  </div>
                  {flagged && (
                    <div className="mt-3 bg-amber-50 border border-amber-200 rounded p-3 flex items-start gap-2">
                      <span className="text-amber-500 text-sm mt-0.5">⚑</span>
                      <div>
                        <p className="text-xs font-semibold text-amber-700 mb-0.5">Research flag — Expert respondent</p>
                        <p className="text-xs text-amber-700">
                          This respondent reported: {flagDetails.join(' and ')}. Their FSES score may reflect domain expertise rather than general financial self-efficacy and should be interpreted accordingly in research contexts.
                        </p>
                      </div>
                    </div>
                  )}
                </>
              );
            })() : (
              <p className="text-gray-400 text-sm italic">Score not yet recorded.</p>

          </div>

          <div className="bg-white shadow rounded p-6">
            <h3 className="text-lg font-bold mb-1">What is the FSES?</h3>
            <p className="text-xs text-gray-400 mb-4 italic">Based on Lown et al.'s Financial Self-Efficacy Scale</p>
            <p className="text-sm text-gray-700 mb-3">
              The <strong>Financial Self-Efficacy Scale (FSES)</strong> measures your belief in your own ability to manage
              financial decisions. It is grounded in Albert Bandura's Self-Efficacy Theory — the idea that confidence in
              a domain directly shapes how we behave within it.
            </p>
            <p className="text-sm text-gray-700 mb-5">
              Your score is the average of three statements rated 1–5. It measures your <em>belief in your own
              capability</em>, which research shows is a strong predictor of long-term financial behavior.
            </p>
            <div className="grid grid-cols-3 gap-3 text-center text-xs">
              <div className="bg-red-50 border border-red-200 rounded p-3">
                <p className="font-bold text-red-600 text-base mb-1">1.0 – 2.9</p>
                <p className="font-semibold text-gray-700 mb-1">Low</p>
                <p className="text-gray-500">Tends to avoid financial decisions or defer entirely to others</p>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded p-3">
                <p className="font-bold text-yellow-600 text-base mb-1">3.0 – 3.9</p>
                <p className="font-semibold text-gray-700 mb-1">Moderate</p>
                <p className="text-gray-500">Some confidence but often second-guesses under pressure</p>
              </div>
              <div className="bg-green-50 border border-green-200 rounded p-3">
                <p className="font-bold text-green-600 text-base mb-1">4.0 – 5.0</p>
                <p className="font-semibold text-gray-700 mb-1">High</p>
                <p className="text-gray-500">Approaches financial decisions with confidence and initiative</p>
              </div>
            </div>
          </div>

          <div className="bg-white shadow rounded p-6">
            <h3 className="text-lg font-bold mb-3">Why Self-Efficacy Matters in Finance</h3>
            <div className="space-y-3">
              {[
                { title: 'It predicts behavior, not just feelings.', body: 'People with high financial self-efficacy are more likely to save consistently, seek financial advice, and follow through on investment plans — regardless of their actual knowledge level.' },
                { title: 'Low efficacy creates a harmful cycle.', body: 'When people believe they are bad at finance, they avoid financial tasks. Avoidance prevents learning. Lack of learning reinforces the belief. The FSES helps identify where someone is in this cycle.' },
                { title: 'It can be changed.', body: "Bandura identified four ways to build self-efficacy: mastery experiences (doing and succeeding), vicarious learning (seeing others succeed), social persuasion (encouragement), and managing anxiety around financial decisions." },
              ].map((item, i) => (
                <div key={i} className="border-l-4 border-blue-400 pl-4">
                  <p className="text-sm font-semibold text-gray-800">{item.title}</p>
                  <p className="text-xs text-gray-600 mt-0.5">{item.body}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Post-assessment status card */}
          {baselineFSES !== null && (() => {
            const SESSION_MS  = 20 * 60 * 1000;
            const sessionStart = (() => { try { const v = localStorage.getItem('fl_session_start'); return v ? Number(v) : null; } catch { return null; } })();
            const postScore    = (() => { try { const v = localStorage.getItem('fl_post_fses');    return v ? parseFloat(v) : null; } catch { return null; } })();
            const elapsed      = sessionStart ? Date.now() - sessionStart : 0;
            const elapsedMin   = Math.min(20, Math.floor(elapsed / 60000));
            const unlocked     = elapsed >= SESSION_MS;
            const pct          = Math.min(100, (elapsed / SESSION_MS) * 100);

            const fsesLabel = s => s >= 4 ? { label: 'High', color: 'text-green-600' } : s >= 3 ? { label: 'Moderate', color: 'text-yellow-600' } : { label: 'Low', color: 'text-red-500' };

            if (postScore !== null) {
              const delta = postScore - baselineFSES;
              return (
                <div className="bg-white shadow rounded p-6">
                  <h3 className="text-lg font-bold mb-0.5">Financial Self-Efficacy: Before &amp; After</h3>
                  <p className="text-xs text-gray-400 mb-5">Financial Self-Efficacy Scale (FSES) · Lown et al. · Bandura's Self-Efficacy Theory</p>
                  <div className="grid grid-cols-3 gap-3 text-center mb-4">
                    <div className="bg-gray-50 border rounded-lg p-4">
                      <p className="text-xs text-gray-400 mb-1">Before</p>
                      <p className="text-3xl font-bold text-gray-800">{baselineFSES.toFixed(1)}</p>
                      <p className={`text-xs font-semibold mt-1 ${fsesLabel(baselineFSES).color}`}>{fsesLabel(baselineFSES).label}</p>
                    </div>
                    <div className={`rounded-lg p-4 flex flex-col items-center justify-center border ${delta >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                      <p className="text-xs text-gray-400 mb-1">Change</p>
                      <p className={`text-3xl font-bold ${delta >= 0 ? 'text-green-600' : 'text-red-500'}`}>{delta >= 0 ? '+' : ''}{delta.toFixed(1)}</p>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                      <p className="text-xs text-gray-400 mb-1">After</p>
                      <p className="text-3xl font-bold text-blue-700">{postScore.toFixed(1)}</p>
                      <p className={`text-xs font-semibold mt-1 ${fsesLabel(postScore).color}`}>{fsesLabel(postScore).label}</p>
                    </div>
                  </div>
                  <div className="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-4">
                    <p className="text-sm text-blue-900 leading-relaxed">
                      {delta > 0
                        ? `Your financial self-efficacy improved by ${delta.toFixed(1)} points. Engaging with real market data and structured reflection is working — keep building on this momentum.`
                        : delta === 0
                        ? "Your score held steady. That's normal — self-efficacy shifts gradually. Continue working through the activities and retake to track your progress over time."
                        : "Your score dipped slightly. This can happen when new knowledge reveals gaps you weren't aware of before — that's actually a sign of growth. Keep going."}
                    </p>
                  </div>
                  <NextStepsCard delta={delta} onGoToLearningPath={onGoToLearningPath} onGoToPortfolio={onGoToPortfolio} />
                  <button
                    onClick={() => {
                      if (window.confirm('This will clear your post-assessment results. Are you sure?')) {
                        try { localStorage.removeItem('fl_post_fses'); localStorage.removeItem('fl_post_answers'); } catch {}
                        onGoToLearningPath();
                      }
                    }}
                    className="text-xs text-gray-400 hover:text-gray-600 underline mt-3 block"
                  >Retake assessment</button>
                </div>

            // Timer hasn't started yet — allocation not locked
            if (!sessionStart) {

                <div className="bg-white shadow rounded p-6">
                  <h3 className="text-lg font-bold mb-1">Post-Assessment</h3>
                  <p className="text-sm text-gray-500 mb-3">
                    The 20-minute timer starts once you confirm your $1,000 allocation in the Portfolio tab. Lock in your picks to begin.
                  </p>
                  <div className="flex items-center gap-2 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                    <span>⚠</span>
                    <span>Allocate your $1,000 portfolio to unlock this pathway.</span>
                  </div>
                </div>
              );
            }

            return (
              <div className="bg-white shadow rounded p-6">
                <div className="flex items-start justify-between mb-1">
                  <h3 className="text-lg font-bold">Post-Assessment</h3>
                  {unlocked && <span className="text-xs font-semibold text-green-600 bg-green-50 border border-green-200 px-2 py-0.5 rounded">Unlocked</span>}
                </div>
                <p className="text-sm text-gray-500 mb-4">
                  {unlocked
                    ? "You've been exploring for 20 minutes. Your post-assessment is ready — retake the FSES to measure how your financial confidence has shifted."

                {!unlocked && (
                  <div className="mb-4">
                    <div className="flex justify-between text-xs text-gray-500 mb-1.5">
                      <span>{elapsedMin} of 20 minutes</span>
                      <span>{20 - elapsedMin} min remaining</span>
                    </div>
                    <div className="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-2.5 bg-blue-400 rounded-full transition-all duration-1000" style={{ width: `${pct}%` }} />
                    </div>
                  </div>
                )}
                {unlocked && (
                  <button
                    onClick={onGoToLearningPath}
                    className="px-5 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors"
                  >
                    Take Post-Assessment →
                  </button>
                )}
              </div>
            );
          })()}
        </div>
      );
    }

    // ── News Tab ───────────────────────────────────────────────────────────────
    function NewsTab({ watchlist }) {
      // newsData: { [ticker]: { articles: [], loading: bool, error: string } }
      const [newsData, setNewsData] = useState({});

      const tickerKey = watchlist.map(s => s.ticker).join(',');

      useEffect(() => {
        if (!watchlist.length) return;

        // Reset and mark all tickers as loading
        setNewsData(
          Object.fromEntries(watchlist.map(s => [s.ticker, { articles: [], loading: true, error: '' }]))
        );

        // Fetch each ticker independently in parallel — guarantees results for every company
        watchlist.forEach(stock => {
          fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${stock.ticker}&limit=20&apikey=${API_KEY}`)
            .then(r => r.json())
            .then(json => {
              if (json.Note || json.Information) throw new Error(json.Note || json.Information);
              setNewsData(prev => ({
                ...prev,
                [stock.ticker]: { articles: json.feed || [], loading: false, error: '' },
              }));
            })
            .catch(e => {
              setNewsData(prev => ({
                ...prev,
                [stock.ticker]: { articles: [], loading: false, error: e.message },
              }));
            });
        });
      }, [tickerKey]);

      const sentimentStyle = (label) => {
        if (!label) return 'bg-gray-100 text-gray-500';
        if (label.includes('Bullish')) return 'bg-green-100 text-green-700';
        if (label.includes('Bearish')) return 'bg-red-100 text-red-600';
        return 'bg-gray-100 text-gray-500';
      };

      const fmtDate = (str) => {
        if (!str || str.length < 8) return '';
        const y = str.slice(0, 4), mo = str.slice(4, 6), d = str.slice(6, 8);
        return new Date(`${y}-${mo}-${d}`).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      };

      if (!watchlist.length) {
        return (
          <div className="bg-white shadow rounded p-8 text-center text-gray-400">
            <p>No stocks in your portfolio yet. Pick 3 stocks to see tailored news.</p>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          {watchlist.map(stock => {
            const d    = newsData[stock.ticker] || { articles: [], loading: true, error: '' };
            const norm = t => (t || '').toUpperCase().trim();

            const getSentiment = a => {
              const ts = (a.ticker_sentiment || []).find(t => norm(t.ticker) === norm(stock.ticker));
              return ts ? ts.ticker_sentiment_label : a.overall_sentiment_label;
            };
            const bullish = d.articles.filter(a => (getSentiment(a) || '').includes('Bullish')).slice(0, 4);
            const bearish = d.articles.filter(a => (getSentiment(a) || '').includes('Bearish')).slice(0, 4);
            const total   = bullish.length + bearish.length;

            const ArticleCard = ({ a, side }) => (
              <a
                href={a.url}
                target="_blank"
                rel="noopener noreferrer"
                className={`block border rounded p-3 transition-colors group ${
                  side === 'bull'
                    ? 'border-green-100 hover:bg-green-50 hover:border-green-300'
                    : 'border-red-100 hover:bg-red-50 hover:border-red-300'
                }`}
              >
                <p className={`text-xs font-medium leading-snug mb-1.5 ${
                  side === 'bull' ? 'text-gray-800 group-hover:text-green-800' : 'text-gray-800 group-hover:text-red-800'
                }`}>
                  {a.title}
                </p>
                <div className="flex items-center gap-1.5 flex-wrap">
                  <span className="text-xs text-gray-400">{a.source}</span>
                  <span className="text-gray-300 text-xs">·</span>
                  <span className="text-xs text-gray-400">{fmtDate(a.time_published)}</span>
                </div>
              </a>
            );

            return (
              <div key={stock.ticker} className="bg-white shadow rounded p-5">
                {/* Section header */}
                <div className="flex items-center gap-2 mb-3 pb-3 border-b">
                  <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded">{stock.ticker}</span>
                  {stock.name && <span className="text-sm font-semibold text-gray-700">{stock.name}</span>}
                  <span className="text-xs text-gray-400 ml-auto">
                    {d.loading ? 'Loading…' : `${total} article${total !== 1 ? 's' : ''}`}
                  </span>
                </div>

                {d.loading && (
                  <div className="flex items-center gap-2 text-gray-400 text-sm py-2">
                    <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                    </svg>
                    Fetching news for {stock.ticker}…
                  </div>
                )}

                {!d.loading && d.error && (
                  <p className="text-sm text-red-400 italic">{d.error}</p>
                )}

                {!d.loading && !d.error && total === 0 && (
                  <p className="text-sm text-gray-400 italic">No bullish or bearish articles found for {stock.ticker} right now.</p>
                )}

                {!d.loading && total > 0 && (
                  <>
                    {/* Bias check banner */}
                    <div className="flex items-start gap-2 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2.5 mb-4">
                      <span className="text-amber-500 text-sm mt-0.5 flex-shrink-0">⚖</span>
                      <p className="text-xs text-amber-800 font-medium leading-relaxed">
                        <strong>Confirmation Bias Check</strong> — read both sides before deciding. Strong investors actively seek out the case against their own position.
                      </p>
                    </div>

                    {/* Two-column layout */}
                    <div className="grid grid-cols-2 gap-4">
                      {/* Bullish column */}
                      <div>
                        <div className="flex items-center gap-1.5 mb-2.5">
                          <span className="text-green-600 font-bold text-sm">↑</span>
                          <h4 className="text-sm font-bold text-green-700">Bullish Case</h4>
                          <span className="text-xs text-green-500 ml-auto">{bullish.length} article{bullish.length !== 1 ? 's' : ''}</span>
                        </div>
                        {bullish.length > 0 ? (
                          <div className="space-y-2">
                            {bullish.map((a, i) => <ArticleCard key={i} a={a} side="bull" />)}
                          </div>
                        ) : (
                          <div className="border border-dashed border-green-200 rounded p-4 text-center">
                            <p className="text-xs text-gray-400 italic">No bullish articles in this batch.</p>
                          </div>
                        )}
                      </div>

                      {/* Bearish column */}
                      <div>
                        <div className="flex items-center gap-1.5 mb-2.5">
                          <span className="text-red-500 font-bold text-sm">↓</span>
                          <h4 className="text-sm font-bold text-red-600">Bearish Case</h4>
                          <span className="text-xs text-red-400 ml-auto">{bearish.length} article{bearish.length !== 1 ? 's' : ''}</span>
                        </div>
                        {bearish.length > 0 ? (
                          <div className="space-y-2">
                            {bearish.map((a, i) => <ArticleCard key={i} a={a} side="bear" />)}
                          </div>
                        ) : (
                          <div className="border border-dashed border-red-200 rounded p-4 text-center">
                            <p className="text-xs text-gray-400 italic">No bearish articles in this batch.</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const ls = {
        get: (key, fallback) => { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; } },
        set: (key, val)      => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
        clear: ()            => { Object.keys(localStorage).filter(k => k.startsWith('fl_')).forEach(k => localStorage.removeItem(k)); },
      };

      const savedFSES   = ls.get('fl_fses', null);
      const savedList   = ls.get('fl_watchlist', []);

      const [showAssessment,     setShowAssessment]     = useState(savedFSES === null);
      const [showStockPicker,    setShowStockPicker]    = useState(false);
      const [baselineFSES,       setBaselineFSES]       = useState(savedFSES);
      const [participantFlags,   setParticipantFlags]   = useState(() => ls.get('fl_flags', null));
      const [watchlist,          setWatchlist]          = useState(savedList);
      const [stockReasoning,     setStockReasoning]     = useState(() => ls.get('fl_reasoning', ''));
      const [tab,                setTab]                = useState(() => ls.get('fl_tab', 'portfolio'));
      const [rounds,             setRounds]             = useState(() => ls.get('fl_rounds', []));
      const [showRoundTransition,setShowRoundTransition]= useState(false);
      const [pendingRound,       setPendingRound]       = useState(null);

      // (timer is stamped by AllocationSection when the user locks their $1k allocation)

      // Sync every piece of state to localStorage whenever it changes
      useEffect(() => { ls.set('fl_fses',      baselineFSES);    }, [baselineFSES]);
      useEffect(() => { ls.set('fl_flags',     participantFlags); }, [participantFlags]);
      useEffect(() => { ls.set('fl_watchlist', watchlist);        }, [watchlist]);
      useEffect(() => { ls.set('fl_reasoning', stockReasoning);   }, [stockReasoning]);
      useEffect(() => { ls.set('fl_tab',       tab);              }, [tab]);
      useEffect(() => { ls.set('fl_rounds',    rounds);           }, [rounds]);

      const handleAssessmentDone = (avg, flags) => {
        setBaselineFSES(avg);
        setParticipantFlags(flags);
        setShowAssessment(false);
        setShowStockPicker(true);
      };

      const handleStocksDone = (picks, reasoning) => {
        setWatchlist(picks);
        setStockReasoning(reasoning || '');
        setShowStockPicker(false);
      };

      const handleReset = () => {
        if (!window.confirm('This will erase all your saved progress and restart from the beginning. Are you sure?')) return;
        ls.clear();
        setBaselineFSES(null);
        setParticipantFlags(null);
        setWatchlist([]);
        setStockReasoning('');
        setRounds([]);
        setTab('portfolio');
        setShowStockPicker(false);
        setShowAssessment(true);
      };

      // Clears round-specific data without touching history (fl_rounds) or flags
      const clearRoundData = () => {
        try {
          ['fl_post_fses','fl_post_answers','fl_session_start','fl_watchlist','fl_reasoning','fl_fses']
            .forEach(k => localStorage.removeItem(k));
          Object.keys(localStorage)
            .filter(k => k.startsWith('fl_steps_') || k.startsWith('fl_alloc_'))
            .forEach(k => localStorage.removeItem(k));
        } catch {}
        setWatchlist([]);
        setStockReasoning('');
      };

      const handleStartNewRound = () => {
        // Compute conviction calibration from the round being closed
        const allocKey  = watchlist.length > 0
          ? 'fl_alloc_' + watchlist.map(s => s.ticker).sort().join('_')
          : null;
        const allocData = allocKey ? ls.get(allocKey, null) : null;

        let calibration = [];
        if (watchlist.length > 0) {
          const total = allocData
            ? watchlist.reduce((sum, s) => sum + (Number(allocData[s.ticker]) || 0), 0)
            : 0;
          const withData = watchlist.map(s => ({
            ticker:    s.ticker,
            name:      s.name || s.ticker,
            allocPct:  total > 0 ? (Number(allocData[s.ticker]) || 0) / total * 100 : 100 / watchlist.length,
            changePct: s.changePct || 0,
          }));
          const byAlloc = [...withData].sort((a, b) => b.allocPct - a.allocPct).map(s => s.ticker);
          const byPerf  = [...withData].sort((a, b) => b.changePct - a.changePct).map(s => s.ticker);
          calibration = withData.map(s => {
            const allocRank = byAlloc.indexOf(s.ticker) + 1;
            const perfRank  = byPerf.indexOf(s.ticker) + 1;
            const diff = allocRank - perfRank;
            return {
              ticker:    s.ticker,
              name:      s.name || s.ticker,
              allocPct:  Math.round(s.allocPct),
              changePct: s.changePct,
              status:    diff >= 1 ? 'overconfident' : diff <= -1 ? 'underconfident' : 'calibrated',
            };
          });
        }

        const postFSES = (() => { try { const v = localStorage.getItem('fl_post_fses'); return v ? parseFloat(v) : null; } catch { return null; } })();
        const newRound = {
          round:       rounds.length + 1,
          preFSES:     baselineFSES,
          postFSES,
          calibration,
          completedAt: Date.now(),
        };
        const newRounds = [...rounds, newRound];
        setRounds(newRounds);
        ls.set('fl_rounds', newRounds);
        setPendingRound(newRound);
        setShowRoundTransition(true);
      };

      const handleCarryOver = () => {
        const newBaseline = pendingRound.postFSES;
        clearRoundData();
        setBaselineFSES(newBaseline);
        setShowRoundTransition(false);
        setPendingRound(null);
        setTab('portfolio');
        setShowStockPicker(true);
      };

      const handleRetake = () => {
        clearRoundData();
        setBaselineFSES(null);
        setShowRoundTransition(false);
        setPendingRound(null);
        setShowAssessment(true);
      };

      const tabs = [
        { key: 'portfolio', label: 'My Portfolio'   },
        { key: 'scores',    label: 'My Scores'      },
        { key: 'learn',     label: 'Learning Path'  },
        { key: 'news',      label: 'Daily News'     },
      ];

      return (
        <>
          {showAssessment  && <AssessmentModal  onClose={handleAssessmentDone} />}
          {showStockPicker && <StockPickerModal onClose={handleStocksDone} />}
          {showRoundTransition && pendingRound && (
            <RoundTransitionModal
              lastRound={pendingRound}
              onCarryOver={handleCarryOver}
              onRetake={handleRetake}
            />
          )}

          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center">
              <h1 className="text-3xl font-bold">Financial Litmus</h1>
              <div className="flex items-center gap-3">
                {baselineFSES !== null && (
                  <span className="text-sm text-gray-500 bg-white shadow rounded px-3 py-1">
                    FSES: <strong>{baselineFSES.toFixed(1)}</strong> / 5
                  </span>
                )}
                {baselineFSES !== null && (
                  <button
                    onClick={handleReset}
                    className="text-xs text-gray-400 hover:text-red-500 transition-colors"
                    title="Erase saved progress and restart"
                  >
                    Start Over
                  </button>
                )}
              </div>
            </div>

            <div className="space-x-2">
              {tabs.map(({ key, label }) => (
                <button key={key} onClick={() => setTab(key)}
                  className={`px-4 py-2 rounded ${tab === key ? 'bg-blue-500 text-white' : 'bg-gray-300'}`}>
                  {label}
                </button>
              ))}
            </div>

            {tab === 'portfolio' && (
              <div className="space-y-4">
                <div className="flex items-center justify-between">
                  <div>
                    <h2 className="text-xl font-semibold">Your Watchlist</h2>
                    <p className="text-sm text-gray-500">Actual price movement over the past 7 trading days</p>
                  </div>
                  <button
                    onClick={() => setShowStockPicker(true)}
                    className="text-xs text-blue-500 hover:underline"
                  >
                    Change stocks
                  </button>
                </div>

                {stockReasoning && (
                  <div className="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-1">
                    <p className="text-xs font-semibold text-blue-500 uppercase tracking-wide mb-1">Your Investment Rationale</p>
                    <p className="text-sm text-blue-900 italic leading-relaxed">"{stockReasoning}"</p>
                  </div>
                )}

                {watchlist.length === 0 ? (
                  <div className="bg-white shadow rounded p-8 text-center text-gray-400">
                    <p className="text-lg mb-2">No stocks selected yet.</p>
                    <button onClick={() => setShowStockPicker(true)} className="text-blue-500 text-sm hover:underline">
                      Pick your 3 stocks
                    </button>
                  </div>
                ) : (
                  <>
                    <PortfolioHealthScore watchlist={watchlist} onGoToLearningPath={() => setTab('learn')} />
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                      {watchlist.map(stock => <StockCard key={stock.ticker} stock={stock} />)}
                    </div>
                    <AllocationSection watchlist={watchlist} />
                  </>
                )}
              </div>
            )}

            {tab === 'scores' && <ScoresTab baselineFSES={baselineFSES} participantFlags={participantFlags} onGoToLearningPath={() => setTab('learn')} onGoToPortfolio={handleStartNewRound} rounds={rounds} />}

            {tab === 'learn' && (
              baselineFSES === null ? (
                <div className="bg-white shadow rounded p-10 text-center text-gray-400">
                  <p className="text-lg font-medium mb-2">No assessment yet</p>
                  <p className="text-sm">Complete the FSES assessment first — your personalized learning path will appear here.</p>
                </div>
              ) : (
                <AdaptiveLearningPlan baselineFSES={baselineFSES} watchlist={watchlist} onGoToPortfolio={handleStartNewRound} />
              )
            )}

            {tab === 'news' && <NewsTab watchlist={watchlist} />}
          </div>
        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
